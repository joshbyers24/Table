<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Table — Dakboard</title>
<style>
  html,body{margin:0;padding:0;background:#000;color:#f5f5f5;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;height:100%;overflow:hidden}
  #frame{position:absolute;inset:0;width:100%;height:100%;border:0;background:#000;opacity:0;transition:opacity .25s}
  #frame.ready{opacity:1}
</style>
</head>
<body>
<iframe id="frame" src="index.html"></iframe>
<script>
  // Dark, minimal CSS injected into the app iframe.
  // Hides everything except the Today hero + meal timeline,
  // restyles for a black background, and disables recipe links.
  const DARK_CSS = `
    :root{
      --bg:#000 !important;
      --surface:#0d0d0d !important;
      --surface-2:#161616 !important;
      --border:#262626 !important;
      --text:#f5f5f5 !important;
      --text-muted:#9a9a9a !important;
      --accent:#bceaa3 !important;
    }
    html,body{background:#000 !important;color:#f5f5f5 !important;}
    /* Hide chrome */
    nav, .nav-tabs, .nav-bottom, header, footer,
    #page-week, #page-meals, #page-shopping,
    .date-tap-zone, .date-hint-arrow,
    #tonight-recipe-btn { display:none !important; }
    /* Show only the today page */
    .page{display:none !important;}
    #page-today{display:block !important;padding:8px 14px !important;}
    /* Cards: dark surfaces */
    .today-hero, .hero-card, .date-card, .accent-card{
      background:#0d0d0d !important;
      border:1px solid #262626 !important;
      color:#f5f5f5 !important;
      box-shadow:none !important;
    }
    .card-eyebrow{color:#9a9a9a !important;}
    .card-title, .card-sub, .dinner-name, .dinner-meta{color:#f5f5f5 !important;}
    .section-label{color:#9a9a9a !important;}
    /* Timeline rows */
    .timeline{background:transparent !important;}
    .timeline-row{
      background:#0d0d0d !important;
      border-color:#262626 !important;
      color:#f5f5f5 !important;
      cursor:default !important;
      pointer-events:none !important;
    }
    .timeline-row.current{
      background:rgba(188,234,163,0.12) !important;
    }
    .timeline-row.current::before{background:#bceaa3 !important;}
    .timeline-row.current .timeline-time{color:#bceaa3 !important;}
    .timeline-row.current .timeline-meal{color:#f5f5f5 !important;}
    .timeline-row.closed{opacity:.55 !important;}
    .timeline-time{color:#9a9a9a !important;}
    .timeline-meal{color:#f5f5f5 !important;}
    .timeline-detail{color:#cfcfcf !important;}
  `;

  const frame = document.getElementById('frame');

  function inject(){
    try{
      const doc = frame.contentDocument;
      if(!doc) return;
      const style = doc.createElement('style');
      style.textContent = DARK_CSS;
      doc.head.appendChild(style);
      // Force the today page on every load
      if(doc.defaultView && typeof doc.defaultView.showPage === 'function'){
        try{ doc.defaultView.showPage('today'); }catch(_){}
      }
      frame.classList.add('ready');
    }catch(e){
      console.error('dakboard inject failed', e);
    }
  }

  frame.addEventListener('load', inject);

  // Refresh once an hour so the "current meal" highlight + date stay accurate.
  setInterval(()=>{ frame.contentWindow.location.reload(); }, 60*60*1000);
</script>
</body>
</html>
