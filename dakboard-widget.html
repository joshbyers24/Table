<!-- Paste this entire block into a Dakboard HTML/JavaScript widget. -->
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  #table-dakboard{
    font-family:'Roboto',-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    color:#f5f5f5;background:#000;padding:8px 4px;
  }
  #table-dakboard .row{
    display:flex;align-items:baseline;gap:18px;
    padding:14px 4px;
    border-bottom:1px solid #262626;
  }
  #table-dakboard .row:last-child{border-bottom:0;}
  #table-dakboard .row.current .time,
  #table-dakboard .row.current .meal,
  #table-dakboard .row.current .detail{color:#bceaa3;}
  #table-dakboard .row.closed{opacity:.55;}
  #table-dakboard .time{
    color:#9a9a9a;font-size:18px;font-weight:600;
    min-width:96px;letter-spacing:.3px;
  }
  #table-dakboard .meal{color:#f5f5f5;font-size:20px;font-weight:600;min-width:140px;}
  #table-dakboard .detail{color:#cfcfcf;font-size:19px;flex:1;text-align:right;}
  #table-dakboard .err{color:#888;font-size:12px;padding:8px;}
</style>

<div id="table-dakboard"><div class="err">Loading…</div></div>

<script>
(function(){
  var SRC = 'https://table-dakboard.vercel.app/index.html';
  var target = document.getElementById('table-dakboard');

  function render(){
    try{
      var schedule = window.getMealSchedule(new Date());
      var idx = window.getCurrentMealIndex(schedule);
      target.innerHTML = schedule.map(function(m, i){
        var cls = 'row' + (i===idx?' current':'') + (m.closed?' closed':'');
        return '<div class="'+cls+'">'
          + '<span class="time">'+m.time+'</span>'
          + '<span class="meal">'+m.name+'</span>'
          + '<span class="detail">'+(m.detail||'')+'</span>'
          + '</div>';
      }).join('');
    }catch(e){
      target.innerHTML = '<div class="err">Render error: '+e.message+'</div>';
    }
  }

  fetch(SRC).then(function(r){return r.text();}).then(function(html){
    // Extract the big inline <script> (the one that defines getMealSchedule)
    var matches = html.match(/<script>([\s\S]*?)<\/script>/g) || [];
    var big = '';
    for (var i=0;i<matches.length;i++){
      if (matches[i].indexOf('getMealSchedule') !== -1){ big = matches[i]; break; }
    }
    if (!big){ target.innerHTML = '<div class="err">Could not find schedule script</div>'; return; }
    big = big.replace(/^<script>/,'').replace(/<\/script>$/,'');

    // Stub out browser-only deps the app expects but we don't need
    var stub = 'window.supabase = window.supabase || { createClient: function(){ var noop = function(){ return { then: function(cb){ cb({data:[]}); return { catch: function(){} }; }, catch: function(){} }; }; var chain = { select: noop, upsert: noop, from: function(){ return chain; } }; return chain; } };\n';
    var s = document.createElement('script');
    s.textContent = stub + big + '\nwindow.getMealSchedule = getMealSchedule; window.getCurrentMealIndex = getCurrentMealIndex;';
    document.head.appendChild(s);

    render();
    // Refresh every 5 minutes so the "current meal" highlight stays accurate
    setInterval(render, 5*60*1000);
  }).catch(function(e){
    target.innerHTML = '<div class="err">Fetch failed: '+e.message+'</div>';
  });
})();
</script>
