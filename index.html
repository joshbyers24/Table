<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Table</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.mjs" type="module"></script>
<script type="module">
  import * as pdfjsLib from 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.mjs';
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.worker.min.mjs';
  window.pdfjsLib = pdfjsLib;
</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --black: #fafbf8;
    --white: #1a1a2e;
    --accent: #88b04b;
    --accent2: #6b9a3a;
    --accent-light: #e8f5e0;
    --surface: #ffffff;
    --surface2: #f2f3ef;
    --border: #e0e2da;
    --mid: #8c8c8c;
    --text: #2d3436;
    --muted: #929d90;
    --danger: #e74c3c;
    --favorite: #f39c12;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  }

- { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
height: 100%;
background: var(--black);
color: var(--text);
font-family: ‘DM Sans’, sans-serif;
}

/* NAV */
nav {
display: flex;
align-items: center;
justify-content: space-between;
padding: 20px 32px;
box-shadow: var(--shadow);
position: sticky;
top: 0;
background: var(--black);
z-index: 100;
}

.nav-logo {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 28px;
letter-spacing: 3px;
color: var(--white);
}

.nav-logo span { color: var(--accent); }

.nav-tabs {
display: flex;
gap: 4px;
}

.nav-tab {
background: none;
border: none;
color: var(--muted);
font-family: ‘DM Sans’, sans-serif;
font-size: 11px;
font-weight: 600;
letter-spacing: 2px;
text-transform: uppercase;
padding: 8px 16px;
border-radius: 3px;
cursor: pointer;
transition: all 0.15s;
}

.nav-tab:hover { color: var(--text); }
.nav-tab.active {
background: var(--surface2);
color: var(--accent);
}

/* PAGES */
.page { display: none; padding: 32px; max-width: 1100px; margin: 0 auto; }
.page.active { display: block; }

/* TODAY PAGE */
.today-hero {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 20px;
margin-bottom: 28px;
}

.hero-card {
background: var(--surface);
border: 1px solid var(--border);
border-radius: 6px;
padding: 28px;
box-shadow: var(--shadow);
}

.hero-card.accent-card {
background: linear-gradient(135deg, #e8f5e0 0%, #d4edda 100%);
border-color: #c3e6cb;
}

.card-eyebrow {
font-size: 10px;
font-weight: 600;
letter-spacing: 3px;
text-transform: uppercase;
color: var(--accent);
margin-bottom: 8px;
}

.card-title {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 48px;
letter-spacing: 2px;
color: var(--white);
line-height: 1;
margin-bottom: 4px;
}

.card-sub {
font-size: 15px;
font-weight: 400;
color: var(--mid);
}

.dinner-name {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 36px;
letter-spacing: 1px;
color: var(--white);
line-height: 1.1;
margin-bottom: 8px;
}

.dinner-meta {
font-size: 13px;
color: var(--mid);
font-weight: 400;
}

.view-recipe-btn {
margin-top: 16px;
display: inline-block;
background: var(--accent);
color: white;
font-size: 11px;
font-weight: 600;
letter-spacing: 2px;
text-transform: uppercase;
padding: 10px 20px;
border-radius: 3px;
border: none;
cursor: pointer;
transition: opacity 0.15s;
text-decoration: none;
}

.view-recipe-btn:hover { opacity: 0.85; }

/* MEAL TIMELINE */
.section-label {
font-size: 10px;
font-weight: 600;
letter-spacing: 3px;
text-transform: uppercase;
color: var(--mid);
margin-bottom: 16px;
}

.timeline {
display: flex;
flex-direction: column;
gap: 2px;
margin-bottom: 32px;
}

.timeline-row {
display: flex;
align-items: center;
gap: 16px;
padding: 14px 20px;
background: var(--surface);
border: 1px solid var(--border);
border-radius: 4px;
transition: border-color 0.15s;
}

.timeline-row.current {
background: #f0f9eb;
border-color: var(--accent);
}

.timeline-row.closed {
background: #fef2f2;
border-color: #fecaca;
}
.timeline-row.closed .timeline-time { color: #dc2626; }
.timeline-row.closed .timeline-meal { color: #991b1b; }

.timeline-time {
font-size: 11px;
font-weight: 600;
letter-spacing: 1px;
color: var(--muted);
min-width: 60px;
}

.timeline-row.current .timeline-time {
color: var(--accent);
}

.timeline-dot {
width: 6px;
height: 6px;
border-radius: 50%;
background: var(--border);
flex-shrink: 0;
}

.timeline-row.current .timeline-dot {
background: var(--accent);
}

.timeline-meal {
font-size: 14px;
font-weight: 400;
color: var(--text);
flex: 1;
}

.timeline-row.current .timeline-meal {
color: var(--text);
font-weight: 600;
}

.timeline-detail {
font-size: 13px;
color: var(--mid);
font-weight: 400;
}

.timeline-row.current .timeline-detail {
color: var(--accent2);
font-weight: 500;
}

.now-badge {
font-size: 8px;
font-weight: 600;
letter-spacing: 2px;
text-transform: uppercase;
background: none;
color: var(--accent);
padding: 0;
border-radius: 0;
}

/* WEEK PAGE */
.week-grid {
display: grid;
grid-template-columns: repeat(7, 1fr);
gap: 8px;
margin-bottom: 32px;
}

.week-day {
background: var(--surface);
border: 1px solid var(--border);
border-radius: 6px;
padding: 16px 12px;
min-height: 140px;
box-shadow: var(--shadow);
}

.week-day.today {
border-color: var(--accent);
}

.week-day-name {
font-size: 9px;
font-weight: 700;
letter-spacing: 2px;
text-transform: uppercase;
color: var(--muted);
margin-bottom: 4px;
}

.week-day-num {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 32px;
color: var(--mid);
line-height: 1;
margin-bottom: 10px;
}

.week-day.today .week-day-num { color: var(--accent); }

.week-meal-tag {
font-size: 10px;
font-weight: 500;
color: var(--text);
line-height: 1.5;
margin-bottom: 4px;
}

.week-who {
font-size: 9px;
font-weight: 600;
letter-spacing: 1px;
text-transform: uppercase;
padding: 2px 6px;
border-radius: 2px;
display: inline-block;
margin-top: 6px;
}

.solo-tag { background: #fff3cd; color: #856404; }
.kids-tag { background: var(--accent-light); color: var(--accent2); }

/* MEALS PAGE */
.meals-grid {
display: grid;
grid-template-columns: repeat(3, 1fr);
gap: 16px;
}

.meal-card {
background: var(--surface);
border: 1px solid var(--border);
border-radius: 6px;
overflow: hidden;
cursor: pointer;
transition: border-color 0.15s, transform 0.15s;
box-shadow: var(--shadow);
}

.meal-card:hover {
border-color: var(--accent);
transform: translateY(-2px);
}

.meal-card-img {
width: 100%;
height: 140px;
background: var(--surface2);
display: flex;
align-items: center;
justify-content: center;
font-size: 40px;
}

.meal-card-body { padding: 16px; }

.meal-card-title {
font-size: 15px;
font-weight: 500;
color: var(--white);
margin-bottom: 4px;
}

.meal-card-meta {
font-size: 11px;
color: var(--muted);
}

/* HF BADGE */
.hf-badge {
  font-size: 8px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  background: var(--accent-light);
  color: var(--accent2);
  padding: 2px 5px;
  border-radius: 2px;
  margin-left: 6px;
  vertical-align: middle;
}

/* PDF CARD HEADER STRIP */
.meal-card-strip {
  height: 6px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
}

/* PDF VIEWER IN MODAL */
.modal.pdf-modal {
  max-width: 95vw;
  max-height: 95vh;
  padding: 16px;
}

.pdf-viewer {
  text-align: center;
}

.pdf-nav {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  margin-bottom: 12px;
}

.pdf-nav button {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text);
  font-size: 16px;
  padding: 6px 14px;
  cursor: pointer;
  transition: all 0.15s;
}

.pdf-nav button:hover { border-color: var(--accent); color: var(--accent); }
.pdf-nav button:disabled { opacity: 0.3; cursor: default; }

.pdf-nav span {
  font-size: 12px;
  color: var(--muted);
  letter-spacing: 1px;
}

#pdf-canvas {
  max-width: 100%;
  max-height: 75vh;
  border-radius: 4px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

/* PDF THUMBNAIL */
.meal-card-thumb {
  width: 100%;
  height: 160px;
  overflow: hidden;
  background: var(--surface2);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

.meal-card-thumb canvas {
  max-width: 100%;
  max-height: 100%;
  object-fit: cover;
}

/* MEALS PAGE SECTIONS */
.meals-section-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--mid);
  margin-bottom: 16px;
  margin-top: 32px;
}

.meals-section-label:first-child { margin-top: 0; }

/* SHOPPING PAGE */
.shopping-header {
display: flex;
justify-content: space-between;
align-items: center;
margin-bottom: 20px;
}

.shopping-week-label {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 28px;
letter-spacing: 1px;
color: var(--white);
}

.shopping-week-label .short-title { display: none; }
.shopping-week-label .full-title { display: inline; }

.shopping-categories {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 16px;
}

.shopping-cat {
background: var(--surface);
border: 1px solid var(--border);
border-radius: 6px;
padding: 20px;
box-shadow: var(--shadow);
}

.shopping-cat-title {
font-size: 10px;
font-weight: 700;
letter-spacing: 3px;
text-transform: uppercase;
color: var(--accent);
margin-bottom: 12px;
}

.shopping-item {
display: flex;
align-items: center;
gap: 12px;
padding: 8px 0;
border-bottom: 1px solid var(--border);
cursor: pointer;
}

.shopping-item:last-child { border-bottom: none; }

.shop-check {
width: 18px;
height: 18px;
border: 2px solid var(--border);
border-radius: 3px;
flex-shrink: 0;
display: flex;
align-items: center;
justify-content: center;
transition: all 0.15s;
}

.shopping-item.checked .shop-check {
background: var(--accent);
border-color: var(--accent);
}

.shopping-item.checked .shop-check::after {
content: ‘✓’;
color: white;
font-size: 11px;
font-weight: 700;
}

.shop-text {
font-size: 13px;
color: var(--text);
transition: color 0.15s;
}

.shopping-item.checked .shop-text {
color: var(--mid);
text-decoration: line-through;
}

/* RECIPE MODAL */
.modal-overlay {
display: none;
position: fixed;
inset: 0;
background: rgba(0,0,0,0.5);
z-index: 200;
align-items: center;
justify-content: center;
padding: 32px;
}

.modal-overlay.open { display: flex; }

.modal {
background: #ffffff;
background: var(--surface);
border: none;
box-shadow: 0 20px 60px rgba(0,0,0,0.15);
border-radius: 8px;
max-width: 680px;
width: 100%;
max-height: 85vh;
overflow-y: auto;
padding: 36px;
position: relative;
}

.modal-close {
position: absolute;
top: 16px;
right: 16px;
background: none;
border: none;
color: var(--muted);
font-size: 24px;
cursor: pointer;
line-height: 1;
}

.modal-close:hover { color: var(--white); }

.modal-eyebrow {
font-size: 10px;
font-weight: 600;
letter-spacing: 3px;
text-transform: uppercase;
color: var(--accent);
margin-bottom: 8px;
}

.modal-title {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 42px;
letter-spacing: 1px;
color: var(--white);
margin-bottom: 24px;
line-height: 1.1;
}

.modal-section {
margin-bottom: 24px;
}

.modal-section-label {
font-size: 10px;
font-weight: 700;
letter-spacing: 3px;
text-transform: uppercase;
color: var(--muted);
margin-bottom: 10px;
padding-bottom: 6px;
border-bottom: 1px solid var(--border);
}

.modal-ingredient {
display: flex;
gap: 10px;
padding: 6px 0;
font-size: 13px;
color: var(--text);
border-bottom: 1px solid var(--border);
}

.modal-ingredient:last-child { border-bottom: none; }

.ing-amount {
color: var(--accent);
min-width: 80px;
font-weight: 500;
}

.modal-step {
display: flex;
gap: 16px;
margin-bottom: 14px;
font-size: 13px;
color: var(--text);
line-height: 1.6;
}

.step-num {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 20px;
color: var(--accent);
flex-shrink: 0;
width: 24px;
}

/* WEEK HEADER */
.week-header {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 20px;
}

.week-range-label {
  flex: 1;
  text-align: center;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 24px;
  letter-spacing: 1px;
  color: var(--white);
}

.week-day.clickable { cursor: pointer; }
.week-day.clickable:hover { border-color: var(--accent); }

/* DATE NAVIGATION */
.date-nav {
  display: flex;
  align-items: stretch;
  gap: 12px;
}

.date-nav .hero-card { flex: 1; }

.date-arrow {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--muted);
  font-size: 24px;
  padding: 0 14px;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  box-shadow: var(--shadow);
}

.date-arrow:hover {
  color: var(--accent);
  border-color: var(--accent);
}

/* CLICKABLE TIMELINE ROW */
.timeline-row.clickable {
  cursor: pointer;
}

.timeline-row.clickable:hover {
  border-color: var(--accent);
}

.timeline-row.clickable .timeline-detail {
  color: var(--accent2);
  text-decoration: underline;
  text-decoration-style: dotted;
  text-underline-offset: 2px;
}

/* SMALL BUTTON */
.btn-small {
  background: none;
  border: 1px solid var(--border);
  color: var(--muted);
  font-family: 'DM Sans', sans-serif;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 6px 12px;
  border-radius: 3px;
  cursor: pointer;
  transition: all 0.15s;
}

.btn-small:hover {
  border-color: var(--muted);
  color: var(--text);
}

/* STAR RATING */
.rating-section {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}

.star-rating {
  display: inline-flex;
  gap: 2px;
  cursor: pointer;
}

.star-rating .star {
  width: 28px;
  height: 28px;
  fill: var(--border);
  transition: fill 0.1s;
}

.star-rating .star.filled { fill: var(--favorite); }
.star-rating .star.half { fill: var(--favorite); clip-path: inset(0 50% 0 0); }

.btn-favorite {
  background: var(--accent-light);
  color: var(--accent2);
  border: 1px solid var(--accent);
  font-family: 'DM Sans', sans-serif;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 6px 12px;
  border-radius: 3px;
  cursor: pointer;
  transition: all 0.15s;
}

.btn-favorite.active {
  background: var(--favorite);
  color: white;
  border-color: var(--favorite);
}

.btn-delete {
  background: none;
  color: var(--danger);
  border: 1px solid var(--danger);
  font-family: 'DM Sans', sans-serif;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 6px 12px;
  border-radius: 3px;
  cursor: pointer;
  transition: all 0.15s;
}

.btn-delete:hover { background: var(--danger); color: white; }

/* FILTER BAR */
.filter-bar {
  display: flex;
  gap: 8px;
  margin-bottom: 20px;
  flex-wrap: wrap;
  align-items: center;
}

.filter-chip {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 11px;
  font-weight: 500;
  padding: 6px 14px;
  border-radius: 20px;
  cursor: pointer;
  transition: all 0.15s;
}

.filter-chip:hover { border-color: var(--accent); }
.filter-chip.active { background: var(--accent); color: white; border-color: var(--accent); }

.filter-select {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 11px;
  padding: 6px 10px;
  border-radius: 20px;
  cursor: pointer;
}

.mini-stars {
  display: inline-flex;
  gap: 1px;
  margin-left: 4px;
  vertical-align: middle;
}

.mini-stars .mini-star {
  width: 10px;
  height: 10px;
  fill: var(--border);
}

.mini-stars .mini-star.filled { fill: var(--favorite); }

/* RESPONSIVE - TABLET */
@media (max-width: 768px) {
nav { padding: 16px 20px; }
.page { padding: 20px; }
.today-hero { grid-template-columns: 1fr; }
.week-grid { grid-template-columns: 1fr; }
.week-day { min-height: auto; display: flex; align-items: center; gap: 12px; padding: 12px 16px; }
.week-day-name { min-width: 36px; margin-bottom: 0; }
.week-day-num { font-size: 22px; min-width: 30px; margin-bottom: 0; }
.week-meal-tag { flex: 1; margin-bottom: 0; }
.week-who { margin-top: 0; }
.meals-grid { grid-template-columns: 1fr 1fr; }
.shopping-categories { grid-template-columns: 1fr; }
.nav-logo { font-size: 22px; }
.nav-tab { padding: 6px 10px; font-size: 10px; }
}

/* RESPONSIVE - IPHONE 13 MINI */
@media (max-width: 430px) {
nav { padding: 12px 16px; }
.nav-logo { font-size: 16px; letter-spacing: 1px; white-space: nowrap; }
.nav-tabs { gap: 2px; }
.nav-tab { padding: 5px 7px; font-size: 9px; letter-spacing: 1px; }
.card-title { font-size: 32px; }
.hero-card { padding: 16px; }
.dinner-name { font-size: 24px; }
.meals-grid { grid-template-columns: 1fr; }
.modal { padding: 20px; margin: 8px; max-height: 95vh; }
.shopping-week-label { font-size: 22px; }
.shopping-week-label .full-title { display: none; }
.shopping-week-label .short-title { display: inline; }
}
</style>

</head>
<body>

<nav>
  <div class="nav-logo" onclick="showPage('today', this)" style="cursor:pointer">THE <span>TABLE</span></div>
  <div class="nav-tabs">
    <button class="nav-tab active" data-page="today" onclick="showPage('today')">Today</button>
    <button class="nav-tab" data-page="week" onclick="showPage('week')">Week</button>
    <button class="nav-tab" data-page="meals" onclick="showPage('meals')">Meals</button>
    <button class="nav-tab" data-page="shopping" onclick="showPage('shopping')">Shopping</button>
  </div>
</nav>

<!-- TODAY PAGE -->

<div class="page active" id="page-today">

  <div class="today-hero">
    <div class="date-nav">
      <button class="date-arrow" onclick="navigateDay(-1)">&#8249;</button>
      <div class="hero-card">
        <div class="card-eyebrow" id="today-date-label">Today</div>
        <div class="card-title" id="today-day-name">Monday</div>
        <div class="card-sub" id="today-full-date">April 6, 2026</div>
      </div>
      <button class="date-arrow" onclick="navigateDay(1)">&#8250;</button>
    </div>
    <div class="hero-card accent-card">
      <div class="card-eyebrow" id="dinner-label">Tonight's Dinner</div>
      <div class="dinner-name" id="tonight-dinner">—</div>
      <div class="dinner-meta" id="tonight-meta">—</div>
      <button class="view-recipe-btn" id="tonight-recipe-btn" onclick="openTonightRecipe()">View Recipe</button>
    </div>
  </div>

  <div class="section-label">Today's Meal Plan</div>
  <div class="timeline" id="meal-timeline"></div>

</div>

<!-- WEEK PAGE -->

<div class="page" id="page-week">

function slugify(str) {
  return str.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');

function guessProtein(name) {
  const n = name.toLowerCase();
  if (n.includes('chicken') || n.includes('poultry')) return 'chicken';
  if (n.includes('beef') || n.includes('steak') || n.includes('sirloin') || n.includes('tenderloin') || n.includes('flautas')) return 'beef';
  if (n.includes('pork') || n.includes('prosciutto') || n.includes('sausage') && !n.includes('chicken sausage')) return 'pork';
  if (n.includes('turkey')) return 'turkey';
  if (n.includes('salmon') || n.includes('shrimp') || n.includes('lobster') || n.includes('seafood') || n.includes('fish')) return 'seafood';
  if (n.includes('meatball')) return 'beef';
  if (n.includes('taco')) return 'beef';
  return 'other';
}

// Seeded PRNG for deterministic dinner selection
function mulberry32(seed) {
  return function() {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    var t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  }
}

function getDateSeed(date) {
  return date.getFullYear() * 10000 + (date.getMonth() + 1) * 100 + date.getDate();
}

function getDinnerForDate(date) {
  const status = getKidStatus(date);
  const pool = RECIPE_REGISTRY.filter(r => {
    if (ratingsCache[r.id]?.is_deleted) return false;
    if (status === 'kids') return r.mealType === 'kids' || r.mealType === 'both';
    return r.mealType === 'solo' || r.mealType === 'both';
  });
  if (pool.length === 0) return null;

  // Get recent meals to avoid repeats
  const recent = [];
  for (let d = 1; d <= 5; d++) {
    const prev = new Date(date);
    prev.setDate(prev.getDate() - d);
    const prevRng = mulberry32(getDateSeed(prev));
    const prevPool = RECIPE_REGISTRY.filter(r => {
      if (ratingsCache[r.id]?.is_deleted) return false;
      const prevStatus = getKidStatus(prev);
      if (prevStatus === 'kids') return r.mealType === 'kids' || r.mealType === 'both';
      return r.mealType === 'solo' || r.mealType === 'both';
    });
    if (prevPool.length > 0) {
      const prevIdx = Math.floor(prevRng() * prevPool.length);
      if (prevPool[prevIdx]) recent.push(prevPool[prevIdx].id);
    }
  }

  // Pick from pool avoiding recent
  const rng = mulberry32(getDateSeed(date));
  let available = pool.filter(r => !recent.includes(r.id));
  if (available.length === 0) available = pool;

  const idx = Math.floor(rng() * available.length);
  return available[idx];
}

}

    currentShoppingWeekStart.setDate(currentShoppingWeekStart.getDate() - currentShoppingWeekStart.getDay());

}

function navigateShoppingWeek(delta) {
  getShoppingWeekStart();
  currentShoppingWeekStart.setDate(currentShoppingWeekStart.getDate() + (delta * 7));
  renderShopping();

function generateShoppingList() {
  const sunday = getShoppingWeekStart();
  const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const satDate = new Date(sunday);
  satDate.setDate(sunday.getDate() + 6);

  // Update week label
  const label = document.getElementById('shopping-week-label');
  if (label) {
    label.textContent = monthNames[sunday.getMonth()] + ' ' + sunday.getDate() + ' - ' +
      monthNames[satDate.getMonth()] + ' ' + satDate.getDate();
  }

  const categories = {
    'Basics (Every Week)': [
      'Eggs (1 dozen)',
      'Oikos Triple Zero yogurt (6-pack)',
      'Chicken breast (2-3 lbs for lunch)',
      'Mixed salad greens',
      'Almonds (¼ cup portions)',
      'Shredded cheese (bag)',
    ]
  };

  // Gather dinner recipes for the week
  const inlineIngredients = {};
  const hfMeals = [];

  for (let i = 0; i < 7; i++) {
    const date = new Date(sunday);
    date.setDate(sunday.getDate() + i);
    const recipe = getDinnerForDate(date);
    if (!recipe) continue;

    if (recipe.source === 'inline') {
      const meal = MEALS.find(m => m.id === recipe.mealId);
      if (meal && meal.ingredients) {
        meal.ingredients.forEach(ing => {
          const key = ing.item;
          if (!inlineIngredients[key]) {
            inlineIngredients[key] = { amount: ing.amount, item: ing.item };
          }
        });
      }
    } else {
      const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      hfMeals.push(dayNames[date.getDay()] + ': ' + recipe.name);
    }
  }

  // Add dinner ingredients
  const dinnerItems = Object.values(inlineIngredients).map(ing =>
    ing.amount !== 'to taste' && ing.amount !== '—' ? ing.amount + ' ' + ing.item : ing.item
  );
  if (dinnerItems.length > 0) {
    categories['Dinner Ingredients'] = dinnerItems;
  }

  if (hfMeals.length > 0) {
    categories['HelloFresh Meals (check cards)'] = hfMeals;
  }

  return categories;
}

  const tab = document.querySelector('.nav-tab[data-page="' + id + '"]');
  if (tab) tab.classList.add('active');
  if (id === 'today') { currentViewDate = new Date(); renderToday(); }
  if (id === 'meals') { setTimeout(initThumbnails, 100); }
  window.scrollTo(0, 0);
}

function getCurrentMealIndex(schedule) {
  const now = new Date();
  const currentMins = now.getHours() * 60 + now.getMinutes();
  let current = 0;
  schedule.forEach((meal, i) => {
    const [time, ampm] = meal.time.split(' ');
    let [h, m] = time.split(':').map(Number);
    if (ampm === 'PM' && h !== 12) h += 12;
    if (ampm === 'AM' && h === 12) h = 0;
    if (currentMins >= h * 60 + m) current = i;
  });
  return current;
}

function findPdfRecipe(name) {
  const lower = name.toLowerCase();
  return [...PDF_RECIPES, ...SPECIAL_RECIPES].find(r => r.name.toLowerCase() === lower);
}

function renderToday() {
  const viewDate = currentViewDate;
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const viewing = isToday(viewDate);

  document.getElementById('today-date-label').textContent = viewing ? 'Today' : days[viewDate.getDay()].substring(0, 3);
  document.getElementById('today-day-name').textContent = days[viewDate.getDay()];
  document.getElementById('today-full-date').textContent =
    months[viewDate.getMonth()] + ' ' + viewDate.getDate() + ', ' + viewDate.getFullYear();

  document.getElementById('dinner-label').textContent = viewing ? "Tonight's Dinner" : 'Dinner';

  const schedule = getMealSchedule(viewDate);
  const currentIdx = viewing ? getCurrentMealIndex(schedule) : -1;
  const dinner = schedule[4];

  const dinnerName = dinner.detail || '—';
  document.getElementById('tonight-dinner').textContent = dinnerName;
  document.getElementById('tonight-meta').textContent = dinner.note || '';

  const recipeBtn = document.getElementById('tonight-recipe-btn');
  recipeBtn.style.display = dinner.recipeId ? '' : 'none';

  const timeline = document.getElementById('meal-timeline');
  timeline.innerHTML = schedule.map((meal, i) => {
    const clickAttr = meal.recipeId ? `onclick="openMealFromTimeline('${meal.recipeId}')"` : '';
    return `
    <div class="timeline-row ${i === currentIdx ? 'current' : ''} ${meal.closed ? 'closed' : ''} ${meal.recipeId ? 'clickable' : ''}" ${clickAttr}>
      <span class="timeline-time">${meal.time}</span>
      <div class="timeline-dot"></div>
      <span class="timeline-meal">${meal.name}</span>
      <span class="timeline-detail">${meal.detail}</span>
    </div>
  `}).join('');
}

function renderWeek() {
  const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const today = new Date();
  today.setHours(0,0,0,0);

  const sunday = currentViewWeekStart ? new Date(currentViewWeekStart) : new Date(today);
  if (!currentViewWeekStart) sunday.setDate(today.getDate() - today.getDay());

  // Week range label
  const satDate = new Date(sunday);
  satDate.setDate(sunday.getDate() + 6);
  const rangeLabel = monthNames[sunday.getMonth()] + ' ' + sunday.getDate() + ' - ' +
    monthNames[satDate.getMonth()] + ' ' + satDate.getDate();
  document.getElementById('week-range-label').textContent = rangeLabel;

  const grid = document.getElementById('week-grid');
  grid.innerHTML = '';

  for (let i = 0; i < 7; i++) {
    const date = new Date(sunday);
    date.setDate(sunday.getDate() + i);
    const isTodayDate = date.getTime() === today.getTime();
    const schedule = getMealSchedule(date);
    const dinner = schedule[4];
    const status = getKidStatus(date);
    const dateStr = date.getFullYear() + '-' + String(date.getMonth()+1).padStart(2,'0') + '-' + String(date.getDate()).padStart(2,'0');

    grid.innerHTML += `
      <div class="week-day clickable ${isTodayDate ? 'today' : ''}" onclick="viewDayFromWeek('${dateStr}')">
        <div class="week-day-name">${dayNames[date.getDay()]}</div>
        <div class="week-day-num">${date.getDate()}</div>
        <div class="week-meal-tag">${dinner.detail}</div>
        <span class="week-who ${status}-tag">${status === 'kids' ? 'Kids' : 'Solo'}</span>
      </div>
    `;
  }
}

function renderPdfCards(recipes) {
  return recipes.map(r => `
    <div class="meal-card" onclick="openPdfRecipe('${r.path.replace(/'/g,"\\'")}', '${r.name.replace(/'/g,"\\'")}')">
      <div class="meal-card-thumb" data-pdf-path="${r.path}">
        <div class="meal-card-strip" style="position:absolute;top:0;left:0;right:0;z-index:1"></div>
      </div>
      <div class="meal-card-body">
        <div class="meal-card-title">${r.name}</div>
        <div class="meal-card-meta">PDF Recipe</div>
      </div>
    </div>
  `).join('');
}

function initThumbnails() {
  if (!window.pdfjsLib) { setTimeout(initThumbnails, 500); return; }
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(async (entry) => {
      if (!entry.isIntersecting) return;
      const el = entry.target;
      const path = el.dataset.pdfPath;
      if (!path || el.dataset.loaded) return;
      el.dataset.loaded = 'true';
      observer.unobserve(el);
      try {
        const cached = sessionStorage.getItem('thumb:' + path);
        if (cached) {
          el.innerHTML = '<img src="' + cached + '" style="width:100%;height:100%;object-fit:cover">';
          return;
        }
        const pdf = await window.pdfjsLib.getDocument(encodeURI(path)).promise;
        const page = await pdf.getPage(1);
        const scale = 0.3;
        const viewport = page.getViewport({ scale });
        const canvas = document.createElement('canvas');
        canvas.width = viewport.width;
        canvas.height = viewport.height;
        const ctx = canvas.getContext('2d');
        await page.render({ canvasContext: ctx, viewport }).promise;
        const dataUrl = canvas.toDataURL('image/jpeg', 0.4);
        try {
          sessionStorage.setItem('thumb:' + path, dataUrl);
        } catch(e) {
          // sessionStorage full — clear old thumbs and retry once
          try {
            const keysToRemove = [];
            for (let k = 0; k < sessionStorage.length; k++) {
              const key = sessionStorage.key(k);
              if (key && key.startsWith('thumb:')) keysToRemove.push(key);
            }
            keysToRemove.forEach(k => sessionStorage.removeItem(k));
            sessionStorage.setItem('thumb:' + path, dataUrl);
          } catch(e2) { /* give up caching */ }
        }
        el.innerHTML = '<img src="' + dataUrl + '" style="width:100%;height:100%;object-fit:cover">';
      } catch(e) {
        el.innerHTML = '<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:12px">PDF</div>';
      }
    });
  }, { rootMargin: '200px' });
  document.querySelectorAll('.meal-card-thumb[data-pdf-path]:not([data-loaded])').forEach(el => observer.observe(el));
}

// ============================================================
// STAR RATING
// ============================================================

function renderStarRating(recipeId) {
  const rating = ratingsCache[recipeId] || {};
  const stars = rating.stars || 0;
  const isFav = rating.is_favorite || false;
  const isDel = rating.is_deleted || false;

  const starSvg = (i) => `<svg viewBox="0 0 24 24" class="star ${i <= stars ? 'filled' : ''}" onclick="event.stopPropagation(); setStarRating('${recipeId}', ${i})"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>`;

  return `
    <div class="rating-section">
      <div class="star-rating">${[1,2,3,4,5].map(i => starSvg(i)).join('')}</div>
      <button class="btn-favorite ${isFav ? 'active' : ''}" onclick="event.stopPropagation(); toggleFavorite('${recipeId}')">${isFav ? '★ Favorite' : '☆ Favorite'}</button>
      <button class="btn-delete" onclick="event.stopPropagation(); toggleDeleted('${recipeId}')">${isDel ? 'Restore' : 'Remove'}</button>
    </div>
  `;
}

function renderMiniStars(recipeId) {
  const rating = ratingsCache[recipeId] || {};
  const stars = rating.stars || 0;
  if (stars === 0) return '';
  return `<span class="mini-stars">${[1,2,3,4,5].map(i =>
    `<svg viewBox="0 0 24 24" class="mini-star ${i <= stars ? 'filled' : ''}"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>`
  ).join('')}</span>`;
}

async function setStarRating(recipeId, stars) {
  const existing = ratingsCache[recipeId] || {};
  await saveRating(recipeId, stars, existing.is_favorite || false, existing.is_deleted || false);
  refreshRatingUI(recipeId);
}

async function toggleFavorite(recipeId) {
  const existing = ratingsCache[recipeId] || {};
  const newFav = !(existing.is_favorite || false);
  await saveRating(recipeId, existing.stars || 0, newFav, existing.is_deleted || false);
  refreshRatingUI(recipeId);
}

async function toggleDeleted(recipeId) {
  const existing = ratingsCache[recipeId] || {};
  const newDel = !(existing.is_deleted || false);
  await saveRating(recipeId, existing.stars || 0, existing.is_favorite || false, newDel);
  refreshRatingUI(recipeId);
  renderMeals();
}

function refreshRatingUI(recipeId) {
  const el = document.getElementById('rating-' + recipeId);
  if (el) el.innerHTML = renderStarRating(recipeId);
}

// ============================================================
// FILTER STATE
// ============================================================

let activeProteinFilter = 'all';
let activeRatingFilter = 0;
let showFavoritesOnly = false;

function setProteinFilter(protein) {
  activeProteinFilter = protein;
  showFavoritesOnly = false;
  renderMeals();
}

function setFavoritesFilter() {
  showFavoritesOnly = !showFavoritesOnly;
  if (showFavoritesOnly) activeProteinFilter = 'all';
  renderMeals();
}

function setRatingFilter(minStars) {
  activeRatingFilter = parseInt(minStars) || 0;
  renderMeals();
}

function renderMeals() {
  // Filter bar
  const proteins = ['all', 'chicken', 'beef', 'pork', 'turkey', 'seafood'];
  const filterBar = document.getElementById('filter-bar');
  filterBar.innerHTML = proteins.map(p =>
    `<button class="filter-chip ${activeProteinFilter === p && !showFavoritesOnly ? 'active' : ''}" onclick="setProteinFilter('${p}')">${p === 'all' ? 'All' : p.charAt(0).toUpperCase() + p.slice(1)}</button>`
  ).join('') +
    `<button class="filter-chip ${showFavoritesOnly ? 'active' : ''}" onclick="setFavoritesFilter()">★ Favorites</button>` +
    `<select class="filter-select" onchange="setRatingFilter(this.value)">
      <option value="0" ${activeRatingFilter === 0 ? 'selected' : ''}>Any Rating</option>
      <option value="1" ${activeRatingFilter === 1 ? 'selected' : ''}>★+ (1+)</option>
      <option value="2" ${activeRatingFilter === 2 ? 'selected' : ''}>★★+ (2+)</option>
      <option value="3" ${activeRatingFilter === 3 ? 'selected' : ''}>★★★+ (3+)</option>
      <option value="4" ${activeRatingFilter === 4 ? 'selected' : ''}>★★★★+ (4+)</option>
      <option value="5" ${activeRatingFilter === 5 ? 'selected' : ''}>★★★★★ (5)</option>
    </select>`;

  // Filter recipes
  let recipes = RECIPE_REGISTRY.filter(r => {
    const rating = ratingsCache[r.id] || {};
    // Hide deleted by default
    if (rating.is_deleted) return false;
    // Protein filter
    if (activeProteinFilter !== 'all' && r.protein !== activeProteinFilter) return false;
    // Favorites filter
    if (showFavoritesOnly && !rating.is_favorite) return false;
    // Rating filter
    if (activeRatingFilter > 0 && (rating.stars || 0) < activeRatingFilter) return false;
    return true;
  });

  // Render grid - uniform cards for all recipes
  const grid = document.getElementById('meals-grid');
  grid.innerHTML = recipes.map(r => {
    const clickHandler = r.source === 'inline'
      ? `openRecipe(${r.mealId})`
      : `openPdfRecipe('${r.path.replace(/'/g,"\\'")}', '${r.name.replace(/'/g,"\\'")}')`;
    const thumbContent = r.source === 'pdf'
      ? `<div class="meal-card-thumb" data-pdf-path="${r.path}"></div>`
      : `<div class="meal-card-thumb" style="background:var(--accent-light);font-size:48px;display:flex;align-items:center;justify-content:center">${r.emoji}</div>`;
    const metaParts = [];
    if (r.cookTime) metaParts.push(r.cookTime);
    const miniStars = renderMiniStars(r.id);
    if (miniStars) metaParts.push(miniStars);
    const hfTag = r.source === 'pdf' ? `<span class="hf-badge">${r.category === 'special' ? 'Special' : 'HF'}</span>` : '';
    return `
      <div class="meal-card" onclick="${clickHandler}">
        ${thumbContent}
        <div class="meal-card-body">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div class="meal-card-title">${r.name}</div>
            ${hfTag}
          </div>
          <div class="meal-card-meta">${metaParts.join(' · ')}</div>
        </div>
      </div>
    `;
  }).join('');

  // Re-init thumbnails for newly rendered cards
  setTimeout(initThumbnails, 100);
}

function getWeekKey() {
  const sunday = getShoppingWeekStart();
  const jan1 = new Date(sunday.getFullYear(), 0, 1);
  const dayOfYear = Math.floor((sunday - jan1) / 86400000) + 1;
  const weekNum = Math.ceil((dayOfYear + jan1.getDay()) / 7);
  return sunday.getFullYear() + '-W' + String(weekNum).padStart(2, '0');
}

async function renderShopping() {
  const list = generateShoppingList();
  const weekKey = getWeekKey();
  const { data } = await sb.from('shopping').select('*').eq('week_key', weekKey);
  const checkedItems = {};
  if (data) data.forEach(d => checkedItems[d.item] = true);

  const container = document.getElementById('shopping-list');
  container.innerHTML = Object.entries(list).map(([cat, items]) => `
    <div class="shopping-cat">
      <div class="shopping-cat-title">${cat}</div>
      ${items.map(item => `
        <div class="shopping-item ${checkedItems[item] ? 'checked' : ''}" onclick="toggleCheck(this, '${item.replace(/'/g,"\\'")}')">
          <div class="shop-check"></div>
          <span class="shop-text">${item}</span>
        </div>
      `).join('')}
    </div>
  `).join('');
}

async function toggleCheck(el, item) {
  el.classList.toggle('checked');
  const weekKey = getWeekKey();
  if (el.classList.contains('checked')) {
    await sb.from('shopping').upsert({ week_key: weekKey, item, checked: true });
  } else {
    await sb.from('shopping').delete().eq('week_key', weekKey).eq('item', item);
  }
}

async function clearChecked() {
  const weekKey = getWeekKey();
  await sb.from('shopping').delete().eq('week_key', weekKey);
  await renderShopping();
}

let currentPdf = null;
let currentPdfPage = 1;

async function openPdfRecipe(path, name) {
  // Find registry ID for this recipe
  const reg = RECIPE_REGISTRY.find(r => r.name === name);
  const recipeId = reg ? reg.id : 'pdf-' + slugify(name);
  document.getElementById('modal-title').textContent = name;
  document.getElementById('modal-content').classList.add('pdf-modal');
  document.getElementById('modal-body').innerHTML = `
    <div id="rating-${recipeId}">${renderStarRating(recipeId)}</div>
    <div class="pdf-viewer">
      <div class="pdf-nav">
        <button id="pdf-prev" onclick="pdfPrevPage()">&#8249; Prev</button>
        <span>Page <span id="pdf-page-num">1</span> of <span id="pdf-page-total">?</span></span>
        <button id="pdf-next" onclick="pdfNextPage()">Next &#8250;</button>
      </div>
      <canvas id="pdf-canvas"></canvas>
    </div>
  `;
  document.getElementById('modal-overlay').classList.add('open');

  try {
    const pdf = await window.pdfjsLib.getDocument(encodeURI(path)).promise;
    currentPdf = pdf;
    currentPdfPage = 1;
    document.getElementById('pdf-page-total').textContent = pdf.numPages;
    renderPdfPage(currentPdfPage);
  } catch (e) {
    document.getElementById('modal-body').innerHTML =
      '<p style="color:var(--muted);text-align:center;padding:40px">Could not load PDF</p>';
  }
}

async function renderPdfPage(num) {
  if (!currentPdf) return;
  const page = await currentPdf.getPage(num);
  const canvas = document.getElementById('pdf-canvas');
  const ctx = canvas.getContext('2d');
  const scale = window.innerWidth < 768 ? 1.5 : 2.0;
  const viewport = page.getViewport({ scale });
  canvas.width = viewport.width;
  canvas.height = viewport.height;
  await page.render({ canvasContext: ctx, viewport }).promise;

  document.getElementById('pdf-page-num').textContent = num;
  document.getElementById('pdf-prev').disabled = (num <= 1);
  document.getElementById('pdf-next').disabled = (num >= currentPdf.numPages);
}

function pdfPrevPage() {
  if (currentPdfPage > 1) { currentPdfPage--; renderPdfPage(currentPdfPage); }
}

function pdfNextPage() {
  if (currentPdf && currentPdfPage < currentPdf.numPages) { currentPdfPage++; renderPdfPage(currentPdfPage); }
}

function openRecipe(id) {
  const meal = MEALS.find(m => m.id === id);
  if (!meal) return;
  const recipeId = 'meal-' + id;
  document.getElementById('modal-title').textContent = meal.name;
  document.getElementById('modal-body').innerHTML = `
    <div id="rating-${recipeId}">${renderStarRating(recipeId)}</div>
    <div class="modal-section">
      <div class="modal-section-label">Ingredients</div>
      ${meal.ingredients.map(ing => `
        <div class="modal-ingredient">
          <span class="ing-amount">${ing.amount}</span>
          <span>${ing.item}</span>
        </div>
      `).join('')}
    </div>
    <div class="modal-section">
      <div class="modal-section-label">Instructions</div>
      ${meal.steps.map((step, i) => `
        <div class="modal-step">
          <span class="step-num">${i+1}</span>
          <span>${step}</span>
        </div>
      `).join('')}
    </div>
  `;
  document.getElementById('modal-overlay').classList.add('open');
}

function openMealFromTimeline(recipeId) {
  const reg = RECIPE_REGISTRY.find(r => r.id === recipeId);
  if (!reg) return;
  if (reg.source === 'inline') {
    openRecipe(reg.mealId);
  } else {
    openPdfRecipe(reg.path, reg.name);
  }
}

function openTonightRecipe() {
  const schedule = getMealSchedule(currentViewDate);
  const dinner = schedule[4];
  if (dinner.recipeId) {
    openMealFromTimeline(dinner.recipeId);
  }
}

function closeModal(event) {
  if (!event || event.target === document.getElementById('modal-overlay') || event.target.classList.contains('modal-close')) {
    document.getElementById('modal-overlay').classList.remove('open');
    document.getElementById('modal-content').classList.remove('pdf-modal');
    currentPdf = null;
    currentPdfPage = 1;
  }
}

// ============================================================
// INIT
// ============================================================

(async function init() {
  try { await loadRatings(); } catch(e) { console.warn('Ratings load failed:', e); }
  renderToday();
  renderWeek();
  renderMeals();
  try { await renderShopping(); } catch(e) { console.warn('Shopping load failed:', e); renderShoppingFallback(); }
  setTimeout(initThumbnails, 1000);

  try {
    sb.channel('shopping-changes')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'shopping' }, () => {
        renderShopping();
      })
      .subscribe();
  } catch(e) { console.warn('Realtime sub failed:', e); }
})();

function renderShoppingFallback() {
  const list = generateShoppingList();
  const saved = JSON.parse(localStorage.getItem('checked') || '{}');
  const container = document.getElementById('shopping-list');
  container.innerHTML = Object.entries(list).map(([cat, items]) => `
    <div class="shopping-cat">
      <div class="shopping-cat-title">${cat}</div>
      ${items.map(item => `
        <div class="shopping-item ${saved[item] ? 'checked' : ''}" onclick="toggleCheck(this, '${item.replace(/'/g,"\\'")}')">
          <div class="shop-check"></div>
          <span class="shop-text">${item}</span>
        </div>
      `).join('')}
    </div>
  `).join('');
}
