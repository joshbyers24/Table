<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Table</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,300&family=Lilita+One&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  window.pdfjsLib = pdfjsLib;
</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --black: #faf8f4;
    --white: #000000;
    --accent: #106a36;
    --accent2: #0d5a2d;
    --accent-light: #bceaa3;
    --surface: #ffffff;
    --surface2: #f5f3f0;
    --border: #e6e6e6;
    --mid: #666666;
    --text: #000000;
    --muted: #666666;
    --danger: #e74c3c;
    --favorite: #f39c12;
    --shadow: 0 1px 3px rgba(0,0,0,0.06);
  }

- { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
height: 100%;
background: var(--black);
color: var(--text);
font-family: 'DM Sans', sans-serif;
}

/* NAV */
nav {
display: flex;
align-items: center;
justify-content: center;
gap: 32px;
padding: 24px 32px;
box-shadow: var(--shadow);
position: sticky;
top: 0;
background: var(--black);
z-index: 100;
}

.nav-logo {
height: 140px;
flex-shrink: 0;
}

.nav-logo svg {
height: 140px;
width: auto;
}

.nav-tabs {
display: flex;
gap: 8px;
align-items: center;
}

.nav-tab {
background: none;
border: none;
color: var(--text);
font-family: 'Lilita One', sans-serif;
font-size: 36px;
text-transform: uppercase;
padding: 8px 20px;
cursor: pointer;
transition: color 0.15s;
border-bottom: none;
border-radius: 0;
font-weight: 400;
letter-spacing: 0;
}

.nav-tab:hover { color: var(--accent); }
.nav-tab.active {
color: var(--accent);
background: none;
}

/* PAGES */
.page { display: none; padding: 32px; max-width: 1100px; margin: 0 auto; }
.page.active { display: block; }

/* TODAY PAGE */
.today-hero {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 24px;
margin-bottom: 28px;
}

.hero-card {
background: var(--surface);
border: 1px solid var(--border);
border-radius: 24px;
padding: 32px;
box-shadow: var(--shadow);
}

.hero-card.accent-card {
background: #106a36;
border: none;
border-radius: 24px;
border-left: none;
}

.card-eyebrow {
font-family: 'Lilita One', sans-serif;
font-size: 14px;
font-weight: 400;
letter-spacing: 3px;
text-transform: uppercase;
color: var(--accent);
margin-bottom: 8px;
}

.card-title {
font-family: 'Lilita One', sans-serif;
font-size: 48px;
font-weight: 400;
letter-spacing: 0;
text-transform: uppercase;
color: var(--text);
line-height: 1;
margin-bottom: 4px;
}

.card-sub {
font-family: 'DM Sans', sans-serif;
font-size: 16px;
font-weight: 400;
color: var(--muted);
text-transform: uppercase;
letter-spacing: 1px;
}

.hero-card.accent-card .card-eyebrow {
color: #bceaa3;
font-size: 18px;
letter-spacing: 2px;
}

.dinner-name {
font-family: 'DM Sans', sans-serif;
font-size: 24px;
font-weight: 700;
letter-spacing: 0;
color: var(--text);
line-height: 1.2;
margin-bottom: 8px;
}

.hero-card.accent-card .dinner-name {
color: #ffffff;
font-family: 'Lilita One', sans-serif;
font-size: 42px;
font-weight: 400;
line-height: 1.1;
}

.dinner-meta {
font-size: 13px;
color: var(--mid);
font-weight: 400;
}

.hero-card.accent-card .dinner-meta {
color: #84b297;
font-family: 'Lilita One', sans-serif;
font-size: 18px;
text-transform: uppercase;
letter-spacing: 1px;
margin-top: 4px;
}

.view-recipe-btn {
margin-top: 20px;
display: inline-block;
background: #000000;
color: #ffffff;
font-family: 'Lilita One', sans-serif;
font-size: 20px;
font-weight: 400;
letter-spacing: 1px;
text-transform: uppercase;
padding: 14px 32px;
border-radius: 14px;
border: none;
cursor: pointer;
transition: opacity 0.15s;
text-decoration: none;
}

.hero-card.accent-card .view-recipe-btn {
background: #000000;
color: #ffffff;
font-family: 'Lilita One', sans-serif;
border-radius: 14px;
}

.view-recipe-btn:hover { opacity: 0.85; }

/* MEAL TIMELINE */
.section-label {
font-family: 'Lilita One', sans-serif;
font-size: 18px;
font-weight: 400;
letter-spacing: 1px;
text-transform: uppercase;
color: var(--text);
margin-bottom: 20px;
}

.timeline {
display: flex;
flex-direction: column;
margin-bottom: 32px;
}

.timeline-row {
display: flex;
align-items: center;
gap: 16px;
padding: 16px 0;
border-bottom: 1px solid var(--border);
background: none;
border-radius: 0;
border-left: none;
border-right: none;
border-top: none;
transition: none;
}

.timeline-row:last-child { border-bottom: none; }

.timeline-row.current .timeline-time {
color: var(--accent);
font-weight: 700;
}

.timeline-row.current .timeline-meal {
font-weight: 700;
color: var(--text);
}

.timeline-row.current.closed .timeline-time { color: var(--danger); }
.timeline-row.current.closed .timeline-meal { color: var(--danger); font-weight: 700; }

.timeline-time {
font-family: 'DM Sans', sans-serif;
font-size: 15px;
font-weight: 400;
letter-spacing: 0;
color: var(--muted);
min-width: 80px;
}

.timeline-meal {
font-family: 'DM Sans', sans-serif;
font-size: 17px;
font-weight: 700;
color: var(--text);
flex: 1;
}

.timeline-detail {
font-family: 'DM Sans', sans-serif;
font-size: 15px;
color: var(--muted);
font-weight: 400;
}

.now-badge {
font-size: 8px;
font-weight: 600;
letter-spacing: 2px;
text-transform: uppercase;
background: none;
color: var(--accent);
padding: 0;
border-radius: 0;
}

/* MONTH VIEW */
.month-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
}

.month-header {
  text-align: center;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  padding: 8px 0;
}

.month-day {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px;
  height: 100px;
  cursor: pointer;
  transition: border-color 0.15s;
  box-shadow: var(--shadow);
  overflow: hidden;
}

.month-day:hover { border-color: var(--accent); }
.month-day.today { border-color: var(--accent); border-width: 2px; background: #e8f5e0; }
.month-day.other-month { opacity: 0.3; }

.month-day-num {
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  font-weight: 600;
  color: var(--muted);
  margin-bottom: 4px;
}

.month-day.today .month-day-num { color: var(--accent); }

.month-day-meal {
  font-size: 11px;
  font-weight: 600;
  color: var(--text);
  line-height: 1.3;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.month-day-tag {
  font-size: 7px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 1px 4px;
  border-radius: 2px;
  display: inline-block;
  margin-top: 4px;
}

.solo-tag { background: #fff3cd; color: #856404; }
.kids-tag { background: #e8f5e0; color: var(--accent2); }

/* MEALS PAGE */
.meals-grid {
display: grid;
grid-template-columns: repeat(3, 1fr);
gap: 16px;
}

.meal-card {
background: var(--surface);
border: 1px solid var(--border);
border-radius: 20px;
overflow: hidden;
cursor: pointer;
transition: border-color 0.15s, transform 0.15s;
box-shadow: var(--shadow);
position: relative;
}

.meal-card:hover {
border-color: var(--accent);
transform: translateY(-2px);
}

.meal-card.today-card {
border-color: var(--accent);
border-width: 2px;
}

.meal-card-img {
width: 100%;
height: 180px;
background: var(--surface2);
display: flex;
align-items: center;
justify-content: center;
font-size: 40px;
}

.meal-card-body {
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 16px;
}

.meal-card-date {
  flex-shrink: 0;
  text-align: center;
  font-family: 'DM Sans', sans-serif;
  min-width: 36px;
}

.meal-card-date .month {
  display: block;
  font-size: 12px;
  font-weight: 700;
  color: var(--mid);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  line-height: 1;
}

.meal-card-date .day {
  display: block;
  font-size: 28px;
  font-weight: 800;
  color: var(--text);
  line-height: 1.1;
  margin-top: 2px;
}

.meal-card-info {
  flex: 1;
  min-width: 0;
}

.meal-card-title {
  font-family: 'DM Sans', sans-serif;
  font-size: 20px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 4px;
  line-height: 1.2;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.meal-card-meta {
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  color: var(--muted);
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 6px;
}

/* HF BADGE - SVG inside body, vertically centered on right */
.hf-badge {
  flex-shrink: 0;
  width: 36px;
  height: 36px;
}

.hf-badge svg {
  width: 100%;
  height: 100%;
}

.hf-badge.text-only {
  width: auto;
  height: auto;
  font-family: 'DM Sans', sans-serif;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  background: var(--accent);
  color: white;
  padding: 4px 8px;
  border-radius: 4px;
}

.meal-card .meal-card-thumb {
  border-top-left-radius: 20px;
  border-top-right-radius: 20px;
}

/* PDF CARD HEADER STRIP */
.meal-card-strip {
  height: 6px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
}

/* PDF THUMBNAIL */
.meal-card-thumb {
  width: 100%;
  height: 200px;
  overflow: hidden;
  background: var(--surface2);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

.meal-card-thumb canvas {
  max-width: 100%;
  max-height: 100%;
  object-fit: cover;
}

/* PLAN PAGE BENTO GRID (7 cards: 2 + big+2 + 2) */
.bento-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

.bento-grid > .meal-card:nth-child(3) {
  grid-row: span 2;
}

.bento-grid > .meal-card:nth-child(3) .meal-card-thumb {
  height: 100%;
  min-height: 280px;
}

@media (max-width: 768px) {
  .bento-grid { grid-template-columns: 1fr; }
  .bento-grid > .meal-card:nth-child(3) { grid-row: auto; }
  .bento-grid > .meal-card:nth-child(3) .meal-card-thumb { min-height: 200px; }
}

/* WEEK NAV (Plan page) */
.week-nav-wrapper {
  display: flex;
  align-items: stretch;
  gap: 12px;
  margin-bottom: 32px;
}

.week-nav-arrow {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 999px;
  width: 48px;
  flex-shrink: 0;
  cursor: pointer;
  font-size: 20px;
  color: var(--text);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
  font-family: 'DM Sans', sans-serif;
}

.week-nav-arrow:hover { border-color: var(--accent); color: var(--accent); }

.week-nav-tabs {
  display: flex;
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 999px;
  overflow: hidden;
}

.week-nav-tab {
  flex: 1;
  background: none;
  border: none;
  border-right: 1px solid var(--border);
  padding: 14px 12px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
  text-align: center;
  min-width: 0;
}

.week-nav-tab:last-child { border-right: none; }
.week-nav-tab:hover { background: var(--surface2); }
.week-nav-tab.active {
  background: var(--accent);
  color: white;
}

.week-nav-tab .week-tab-label {
  display: block;
  font-family: 'DM Sans', sans-serif;
  font-size: 11px;
  font-weight: 500;
  opacity: 0.7;
  margin-bottom: 2px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.week-nav-tab .week-tab-dates {
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 700;
}

/* MEALS PAGE SECTIONS */
.meals-section-label {
  font-family: 'Lilita One', sans-serif;
  font-size: 14px;
  font-weight: 400;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--text);
  margin-bottom: 16px;
  margin-top: 32px;
}

.meals-section-label:first-child { margin-top: 0; }

/* SHOPPING PAGE */
.shopping-header {
display: flex;
justify-content: space-between;
align-items: center;
margin-bottom: 20px;
}

.shopping-week-label {
font-family: 'Lilita One', sans-serif;
font-size: 24px;
letter-spacing: 0;
color: var(--text);
}

.shopping-week-label .short-title { display: none; }
.shopping-week-label .full-title { display: inline; }

.shopping-categories {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 16px;
}

.shopping-cat {
background: var(--surface);
border: 1px solid var(--border);
border-radius: 12px;
padding: 20px;
box-shadow: var(--shadow);
}

.shopping-cat-title {
font-family: 'Lilita One', sans-serif;
font-size: 13px;
font-weight: 400;
letter-spacing: 1px;
text-transform: uppercase;
color: var(--accent);
margin-bottom: 12px;
}

.shopping-item {
display: flex;
align-items: center;
gap: 12px;
padding: 8px 0;
border-bottom: 1px solid var(--border);
cursor: pointer;
}

.shopping-item:last-child { border-bottom: none; }

.shop-check {
width: 18px;
height: 18px;
border: 2px solid var(--border);
border-radius: 3px;
flex-shrink: 0;
display: flex;
align-items: center;
justify-content: center;
transition: all 0.15s;
}

.shopping-item.checked .shop-check {
background: var(--accent);
border-color: var(--accent);
}

.shopping-item.checked .shop-check::after {
content: '✓';
color: white;
font-size: 11px;
font-weight: 700;
}

.shop-text {
font-size: 13px;
color: var(--text);
transition: color 0.15s;
}

.shopping-item.checked .shop-text {
color: var(--mid);
text-decoration: line-through;
}

/* RECIPE MODAL */
.modal-overlay {
display: none;
position: fixed;
inset: 0;
background: rgba(0,0,0,0.5);
z-index: 200;
align-items: center;
justify-content: center;
padding: 32px;
}

.modal-overlay.open { display: flex; }

.modal {
background: #ffffff;
background: var(--surface);
border: none;
box-shadow: 0 20px 60px rgba(0,0,0,0.15);
border-radius: 12px;
max-width: 680px;
width: 100%;
max-height: 85vh;
overflow-y: auto;
padding: 36px;
position: relative;
}

.modal-close {
position: absolute;
top: 16px;
right: 16px;
background: none;
border: none;
color: var(--muted);
font-size: 24px;
cursor: pointer;
line-height: 1;
}

.modal-close:hover { color: var(--white); }

.modal-eyebrow {
font-size: 10px;
font-weight: 600;
letter-spacing: 3px;
text-transform: uppercase;
color: var(--accent);
margin-bottom: 8px;
}

.modal-title {
font-family: 'DM Sans', sans-serif;
font-size: 32px;
font-weight: 800;
letter-spacing: 0;
color: var(--white);
margin-bottom: 24px;
line-height: 1.1;
}

.modal-section {
margin-bottom: 24px;
}

.modal-section-label {
font-size: 10px;
font-weight: 700;
letter-spacing: 3px;
text-transform: uppercase;
color: var(--muted);
margin-bottom: 10px;
padding-bottom: 6px;
border-bottom: 1px solid var(--border);
}

.modal-ingredient {
display: flex;
gap: 10px;
padding: 6px 0;
font-size: 13px;
color: var(--text);
border-bottom: 1px solid var(--border);
}

.modal-ingredient:last-child { border-bottom: none; }

.ing-amount {
color: var(--accent);
min-width: 80px;
font-weight: 600;
}

.modal-step {
text-align: center;
margin-bottom: 24px;
font-size: 14px;
color: var(--text);
line-height: 1.6;
}

.step-num {
font-family: 'Lilita One', sans-serif;
font-size: 28px;
color: var(--accent);
display: block;
margin-bottom: 4px;
}

.modal-step span:last-child {
display: block;
font-size: 14px;
color: var(--text);
line-height: 1.6;
}

/* WEEK HEADER */
.week-header {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 20px;
}

.week-range-label {
  flex: 1;
  text-align: center;
  font-family: 'Lilita One', sans-serif;
  font-size: 24px;
  letter-spacing: 0;
  color: var(--text);
}

.date-arrow {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--muted);
  font-size: 24px;
  padding: 0 14px;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  box-shadow: var(--shadow);
}

.date-arrow:hover {
  color: var(--accent);
  border-color: var(--accent);
}

/* DATE CARD TAP ZONES */
.date-card {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 120px;
}

.date-card-content {
  text-align: center;
  position: relative;
  z-index: 1;
  pointer-events: none;
}

.date-tap-zone {
  position: absolute;
  top: 0;
  bottom: 0;
  width: 33.33%;
  cursor: pointer;
  z-index: 2;
  -webkit-tap-highlight-color: transparent;
}

.date-tap-zone.left { left: 0; }
.date-tap-zone.right { right: 0; }
.date-tap-zone:active { background: rgba(0,0,0,0.03); }

.date-hint-arrow {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  font-size: 28px;
  color: #999;
  pointer-events: none;
  transition: color 0.15s;
}

.date-tap-zone.left .date-hint-arrow { left: 12px; }
.date-tap-zone.right .date-hint-arrow { right: 12px; }
.date-tap-zone:hover .date-hint-arrow { color: var(--muted); }

/* CLICKABLE TIMELINE ROW */
.timeline-row.clickable {
  cursor: pointer;
}

.timeline-row.clickable:hover {
  border-color: var(--accent);
}

.timeline-row.clickable .timeline-detail {
  color: var(--accent2);
  text-decoration: underline;
  text-decoration-style: dotted;
  text-underline-offset: 2px;
}

/* SMALL BUTTON */
.btn-small {
  background: none;
  border: 1px solid var(--border);
  color: var(--muted);
  font-family: 'DM Sans', sans-serif;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 6px 12px;
  border-radius: 3px;
  cursor: pointer;
  transition: all 0.15s;
}

.btn-small:hover {
  border-color: var(--muted);
  color: var(--text);
}

/* STAR RATING */
.rating-section {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}

.star-rating {
  display: inline-flex;
  gap: 2px;
  cursor: pointer;
}

.star-rating .star {
  width: 28px;
  height: 28px;
  fill: var(--border);
  transition: fill 0.1s;
}

.star-rating .star.filled { fill: var(--favorite); }
.star-rating .star.half { fill: var(--favorite); clip-path: inset(0 50% 0 0); }

.btn-favorite {
  background: #e8f5e0;
  color: var(--accent2);
  border: 1px solid var(--accent);
  font-family: 'DM Sans', sans-serif;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 6px 12px;
  border-radius: 3px;
  cursor: pointer;
  transition: all 0.15s;
}

.btn-favorite.active {
  background: var(--favorite);
  color: white;
  border-color: var(--favorite);
}

.btn-delete {
  background: none;
  color: var(--muted);
  border: none;
  font-family: 'DM Sans', sans-serif;
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 0;
  text-transform: none;
  text-decoration: underline;
  padding: 4px 0;
  border-radius: 0;
  cursor: pointer;
  transition: all 0.15s;
}

.btn-delete:hover { color: var(--danger); }

.meal-type-toggle {
  display: inline-flex;
  border: 1px solid var(--border);
  border-radius: 4px;
  overflow: hidden;
  margin-left: 12px;
}

.toggle-btn {
  background: none;
  border: none;
  border-right: 1px solid var(--border);
  color: var(--muted);
  font-family: 'DM Sans', sans-serif;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 5px 10px;
  cursor: pointer;
  transition: all 0.15s;
}

.toggle-btn:last-child { border-right: none; }
.toggle-btn.active { background: var(--accent); color: white; }

/* FILTER BAR */
.filter-bar {
  display: flex;
  gap: 8px;
  margin-bottom: 20px;
  flex-wrap: wrap;
  align-items: center;
}

.filter-chip {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'Lilita One', sans-serif;
  font-size: 13px;
  font-weight: 400;
  padding: 8px 16px;
  border-radius: 20px;
  cursor: pointer;
  transition: all 0.15s;
}

.filter-chip:hover { border-color: var(--accent); }
.filter-chip.active { background: var(--accent); color: white; border-color: var(--accent); }

.filter-select {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 11px;
  padding: 6px 10px;
  border-radius: 20px;
  cursor: pointer;
}

.mini-stars {
  display: inline-flex;
  gap: 1px;
  margin-left: 4px;
  vertical-align: middle;
}

.mini-stars .mini-star {
  width: 14px;
  height: 14px;
  fill: var(--border);
}

.mini-stars .mini-star.filled { fill: var(--favorite); }

/* RESPONSIVE - TABLET */
@media (max-width: 768px) {
nav { padding: 16px 20px; gap: 16px; }
.page { padding: 20px; }
.today-hero { grid-template-columns: 1fr; }
.month-day { height: 80px; padding: 6px; }
.month-day-num { font-size: 11px; }
.month-day-meal { font-size: 9px; }
.meals-grid { grid-template-columns: 1fr 1fr; }
.shopping-categories { grid-template-columns: 1fr; }
.nav-logo { height: 70px; }
.nav-logo svg { height: 70px; }
.nav-tab { padding: 6px 10px; font-size: 20px; }
.hero-card.accent-card .dinner-name { font-size: 32px; }
.hero-card.accent-card .dinner-meta { font-size: 14px; }
.view-recipe-btn { font-size: 16px; padding: 12px 24px; }
}

/* RESPONSIVE - IPHONE 13 MINI */
@media (max-width: 430px) {
nav { padding: 12px 16px; }
.nav-logo { height: 50px; }
.nav-logo svg { height: 50px; }
.nav-tabs { gap: 2px; }
.nav-tab { padding: 5px 7px; font-size: 14px; }
.hero-card.accent-card .dinner-name { font-size: 26px; }
.hero-card.accent-card .card-eyebrow { font-size: 14px; }
.hero-card.accent-card .dinner-meta { font-size: 13px; }
.view-recipe-btn { font-size: 14px; padding: 10px 20px; }
.card-title { font-size: 32px; }
.hero-card { padding: 16px; }
.dinner-name { font-size: 20px; }
.hero-card.accent-card .dinner-name { font-size: 24px; }
.meals-grid { grid-template-columns: 1fr; }
.modal { padding: 20px; margin: 8px; max-height: 95vh; }
.shopping-week-label { font-size: 20px; }
.shopping-week-label .full-title { display: none; }
.shopping-week-label .short-title { display: inline; }
}

/* RECIPE EDITOR */
.recipe-editor { max-width: 600px; }

.editor-field {
  margin-bottom: 16px;
}

.editor-field label {
  display: block;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 6px;
}

.editor-field input,
.editor-field select,
.editor-field textarea {
  width: 100%;
  padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  color: var(--text);
  background: var(--surface);
}

.editor-field input:focus,
.editor-field textarea:focus {
  outline: none;
  border-color: var(--accent);
}

.editor-row {
  display: flex;
  gap: 8px;
  align-items: center;
  margin-bottom: 8px;
}

.editor-row input { flex: 1; }
.editor-row .amount-input { max-width: 100px; }

.editor-add-btn {
  background: none;
  border: 1px dashed var(--border);
  border-radius: 8px;
  color: var(--muted);
  font-size: 13px;
  padding: 8px;
  width: 100%;
  cursor: pointer;
  transition: all 0.15s;
}

.editor-add-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
}

.editor-remove-btn {
  background: none;
  border: none;
  color: var(--muted);
  font-size: 18px;
  cursor: pointer;
  padding: 4px 8px;
  line-height: 1;
}

.editor-remove-btn:hover { color: var(--danger); }

.editor-actions {
  display: flex;
  gap: 12px;
  margin-top: 24px;
}

.editor-save {
  flex: 1;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 8px;
  padding: 12px;
  font-family: 'Lilita One', sans-serif;
  font-size: 14px;
  font-weight: 400;
  cursor: pointer;
}

.editor-cancel {
  background: none;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 24px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  color: var(--muted);
  cursor: pointer;
}

/* MODAL EDIT BUTTON */
.modal-edit {
  position: absolute;
  top: 16px;
  right: 48px;
  background: none;
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--muted);
  font-family: 'DM Sans', sans-serif;
  font-size: 11px;
  font-weight: 600;
  padding: 4px 10px;
  cursor: pointer;
}
.modal-edit:hover { border-color: var(--accent); color: var(--accent); }

/* CUSTOM BADGE */
.custom-badge {
  font-size: 8px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  background: #e8f0fe;
  color: #4a7dbd;
  padding: 2px 5px;
  border-radius: 2px;
  margin-left: 6px;
  vertical-align: middle;
}

/* HF TOGGLE */
.hf-toggle {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
  cursor: pointer;
  margin-left: 12px;
}

.hf-toggle input[type="checkbox"] {
  accent-color: var(--accent);
}

/* RECIPE IMAGE PREVIEW IN EDITOR */
.editor-image-preview {
  width: 100%;
  border-radius: 8px;
  overflow: hidden;
  background: var(--surface2);
}

.meal-card-thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.meal-card-thumb .placeholder-img {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 48px;
  background: linear-gradient(135deg, #e8f5e0, #bceaa3);
}
</style>

let recipeImageCache = {};

async function loadRecipeImages() {
  try {
    const { data } = await sb.from('recipe_images').select('*');
    if (data) data.forEach(r => recipeImageCache[r.recipe_id] = r.image_data);
  } catch(e) { console.warn('Image load failed:', e); }
}

async function extractRecipeImage(path) {
  if (!window.pdfjsLib) return null;
  const cacheKey = 'img:' + path;
  const cached = sessionStorage.getItem(cacheKey);
  if (cached) return cached;
  try {
    const pdf = await window.pdfjsLib.getDocument(encodeURI(path)).promise;
    const page = await pdf.getPage(1);
    const scale = 0.6;
    const viewport = page.getViewport({ scale });
    const canvas = document.createElement('canvas');
    canvas.width = viewport.width;
    // Crop to top 40% for food photo
    const cropHeight = Math.floor(viewport.height * 0.4);
    canvas.height = cropHeight;
    const ctx = canvas.getContext('2d');
    await page.render({ canvasContext: ctx, viewport }).promise;
    const dataUrl = canvas.toDataURL('image/jpeg', 0.6);
    try { sessionStorage.setItem(cacheKey, dataUrl); } catch(e) {}
    return dataUrl;
  } catch(e) { return null; }
}

function generatePlaceholderImage() {
  const canvas = document.createElement('canvas');
  canvas.width = 300;
  canvas.height = 180;
  const ctx = canvas.getContext('2d');
  const gradient = ctx.createLinearGradient(0, 0, 300, 180);
  gradient.addColorStop(0, '#f0f5e8');
  gradient.addColorStop(1, '#e0ead4');
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, 300, 180);
  return canvas.toDataURL('image/jpeg', 0.7);
}

function getRecipeImage(recipeId, pdfPath) {
  // 1. Check uploaded images from Supabase
  if (recipeImageCache[recipeId]) return recipeImageCache[recipeId];
  // 2. Check sessionStorage for extracted image
  if (pdfPath) {
    const cached = sessionStorage.getItem('img:' + pdfPath);
    if (cached) return cached;
  }
  // 3. Check sessionStorage thumbnail cache (fallback)
  if (pdfPath) {
    const cached = sessionStorage.getItem('thumb:' + pdfPath);
    if (cached) return cached;
  }
  // 4. Return null (will show placeholder)
  return null;
}

async function saveRecipeImage(recipeId, imageData) {
  recipeImageCache[recipeId] = imageData;
  try {
    await sb.from('recipe_images').upsert({
      recipe_id: recipeId,
      image_data: imageData,
      updated_at: new Date().toISOString()
    });
  } catch(e) { console.warn('Image save failed:', e); }
}

function previewEditorImage(input) {
  if (!input.files || !input.files[0]) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = document.getElementById('editor-image-img');
    if (img) {
      img.src = e.target.result;
      img.style.display = '';
      img.dataset.newImage = e.target.result;
    }
    const placeholder = document.getElementById('editor-image-placeholder');
    if (placeholder) placeholder.style.display = 'none';
  };
  reader.readAsDataURL(input.files[0]);
}

function isRecipeHellofresh(recipeId) {
  const rating = ratingsCache[recipeId];
  if (rating && rating.is_hellofresh !== undefined && rating.is_hellofresh !== null) {
    return rating.is_hellofresh;
  }
  // Default: PDF_RECIPES and SPECIAL_RECIPES are HF, inline MEALS are not
  const reg = RECIPE_REGISTRY.find(r => r.id === recipeId);
  if (!reg) return false;
  return reg.source === 'pdf';
}

function getKidStatus(date) {
  const msPerDay = 86400000;
  const daysSinceAnchor = Math.floor((date - SCHEDULE_ANCHOR) / msPerDay);
  const posInCycle = ((daysSinceAnchor % 14) + 14) % 14;
  // Cycle: 0=Mon ex, 1=Tue ex, 2=Wed Josh, 3=Thu Josh, 4=Fri ex, 5=Sat ex, 6=Sun ex,

  const joshDays = [2,3,7,8,11,12,13];
  return joshDays.includes(posInCycle) ? 'kids' : 'solo';
}

function slugify(str) {
  return str.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
}

function guessProtein(name) {
  const n = name.toLowerCase();
  if (n.includes('chicken') || n.includes('poultry')) return 'chicken';
  if (n.includes('beef') || n.includes('steak') || n.includes('sirloin') || n.includes('tenderloin') || n.includes('flautas')) return 'beef';
  if (n.includes('pork') || n.includes('prosciutto') || n.includes('sausage') && !n.includes('chicken sausage')) return 'pork';
  if (n.includes('turkey')) return 'turkey';
  if (n.includes('salmon') || n.includes('shrimp') || n.includes('lobster') || n.includes('seafood') || n.includes('fish')) return 'seafood';
  if (n.includes('meatball')) return 'beef';
  if (n.includes('taco')) return 'beef';
  return 'other';
}

const RECIPE_REGISTRY = [
  ...MEALS.map(m => ({
    id: 'meal-' + m.id,
    name: m.name,

// Seeded PRNG for deterministic dinner selection
function mulberry32(seed) {
  return function() {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    var t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  }
}

function getDateSeed(date) {
  return date.getFullYear() * 10000 + (date.getMonth() + 1) * 100 + date.getDate();
}

function getDinnerForDate(date) {
  const status = getKidStatus(date);
  const pool = RECIPE_REGISTRY.filter(r => {
    if (ratingsCache[r.id]?.is_deleted) return false;
    const effectiveType = ratingsCache[r.id]?.meal_type || r.mealType;
    if (status === 'kids') return effectiveType === 'kids' || effectiveType === 'both';
    return effectiveType === 'solo' || effectiveType === 'both';
  });
  if (pool.length === 0) return null;

  // Get recent meals to avoid repeats
  const recent = [];
  for (let d = 1; d <= 5; d++) {
    const prev = new Date(date);
    prev.setDate(prev.getDate() - d);
    const prevRng = mulberry32(getDateSeed(prev));
    const prevPool = RECIPE_REGISTRY.filter(r => {
      if (ratingsCache[r.id]?.is_deleted) return false;
      const prevStatus = getKidStatus(prev);
      const et = ratingsCache[r.id]?.meal_type || r.mealType;
      if (prevStatus === 'kids') return et === 'kids' || et === 'both';
      return et === 'solo' || et === 'both';
    });
    if (prevPool.length > 0) {
      const prevIdx = Math.floor(prevRng() * prevPool.length);
      if (prevPool[prevIdx]) recent.push(prevPool[prevIdx].id);
    }
  }

  // Pick from pool avoiding recent
  const rng = mulberry32(getDateSeed(date));
  let available = pool.filter(r => !recent.includes(r.id));
  if (available.length === 0) available = pool;

  const idx = Math.floor(rng() * available.length);
  return available[idx];
}

// Daily meal schedule
function getMealSchedule(date) {
  const day = date.getDay();
  const status = getKidStatus(date);

  const base = [
    { time: '9:00 AM',  name: 'Breakfast', detail: '3 eggs + ¼ cup cheese', mealId: null },
    { time: '11:30 AM', name: 'Snack',     detail: 'Oikos yogurt or almonds', mealId: null },
    { time: '1:30 PM',  name: 'Lunch',     detail: 'Chicken + greens', mealId: null },
    { time: '4:00 PM',  name: 'Snack',     detail: 'Oikos yogurt or almonds', mealId: null },
    { time: '6:30 PM',  name: 'Dinner',    detail: '', mealId: null, recipeId: null },
    { time: '8:00 PM',  name: 'Kitchen Closed', detail: '', mealId: null, closed: true }
  ];

  if (day === 2) {
    base[2].detail = 'Staff lunch out — eat smart';
  }

  const recipe = getDinnerForDate(date);
  if (recipe) {
    base[4].detail = recipe.name;
    base[4].recipeId = recipe.id;
    if (recipe.source === 'inline') base[4].mealId = recipe.mealId;
    base[4].note = status === 'kids' ? 'Kids night' : 'Solo night';
  }

  return base;
}

let currentShoppingWeekStart = null;

function getShoppingWeekStart() {
  if (!currentShoppingWeekStart) {
    currentShoppingWeekStart = new Date();
    currentShoppingWeekStart.setHours(0,0,0,0);
    currentShoppingWeekStart.setDate(currentShoppingWeekStart.getDate() - currentShoppingWeekStart.getDay());
  }
  return new Date(currentShoppingWeekStart);
}

function navigateShoppingWeek(delta) {
  getShoppingWeekStart();
  currentShoppingWeekStart.setDate(currentShoppingWeekStart.getDate() + (delta * 7));
  renderShopping();
}

function generateShoppingList() {
  const sunday = getShoppingWeekStart();
  const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const satDate = new Date(sunday);
  satDate.setDate(sunday.getDate() + 6);

  // Update week label
  const label = document.getElementById('shopping-week-label');
  if (label) {
    label.textContent = monthNames[sunday.getMonth()] + ' ' + sunday.getDate() + ' - ' +
      monthNames[satDate.getMonth()] + ' ' + satDate.getDate();
  }

  const categories = {
    'Basics (Every Week)': [
      'Eggs (1 dozen)',
      'Oikos Triple Zero yogurt (6-pack)',
      'Chicken breast (2-3 lbs for lunch)',
      'Mixed salad greens',
      'Almonds (¼ cup portions)',
      'Shredded cheese (bag)',
    ]
  };

  // Gather dinner recipes for the week
  const inlineIngredients = {};
  const hfMeals = [];

  for (let i = 0; i < 7; i++) {
    const date = new Date(sunday);
    date.setDate(sunday.getDate() + i);
    const recipe = getDinnerForDate(date);
    if (!recipe) continue;

    if (recipe.source === 'custom') {
      const customData = recipe._customData || customRecipes.find(function(r) { return r.id === recipe.id; });
      if (customData && customData.ingredients) {
        customData.ingredients.forEach(function(ing) {
          const key = ing.item;
          if (!inlineIngredients[key]) {
            inlineIngredients[key] = { amount: ing.amount, item: ing.item };
          }
        });
      }
    } else if (recipe.source === 'inline') {
      const meal = MEALS.find(m => m.id === recipe.mealId);
      if (meal && meal.ingredients) {
        meal.ingredients.forEach(ing => {
          const key = ing.item;
          if (!inlineIngredients[key]) {
            inlineIngredients[key] = { amount: ing.amount, item: ing.item };
          }
        });
      }
    } else {
      const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      const hfData = HF_RECIPE_DATA[recipe.name];
      hfMeals.push({ day: dayNames[date.getDay()], name: recipe.name, path: recipe.path, hasData: !!hfData });
      // If structured HF data exists, add ingredients to dinner ingredients
      if (hfData) {
        hfData.ingredients.forEach(ing => {
          const key = ing.item;
          if (!inlineIngredients[key]) {
            inlineIngredients[key] = { amount: ing.amount, item: ing.item };
          }
        });
      }
    }
  }

  // Add dinner ingredients
  const dinnerItems = Object.values(inlineIngredients).map(ing =>
    ing.amount !== 'to taste' && ing.amount !== '—' ? ing.amount + ' ' + ing.item : ing.item
  );
  if (dinnerItems.length > 0) {
    categories['Dinner Ingredients'] = dinnerItems;
  }

  if (hfMeals.length > 0) {
    categories._hfMeals = hfMeals;
  }

  return categories;
}

let currentViewDate = new Date();
let currentViewMonth = null; // null = current month, else {year, month}

function navigateDay(delta) {
  currentViewDate.setDate(currentViewDate.getDate() + delta);
  renderToday();
}

function isToday(date) {
  const now = new Date();
  return date.getDate() === now.getDate() &&
    date.getMonth() === now.getMonth() &&
    date.getFullYear() === now.getFullYear();
}

function navigateMonth(delta) {
  if (!currentViewMonth) {
    const now = new Date();
    currentViewMonth = { year: now.getFullYear(), month: now.getMonth() };
  }
  currentViewMonth.month += delta;
  if (currentViewMonth.month > 11) {
    currentViewMonth.month = 0;
    currentViewMonth.year++;
  } else if (currentViewMonth.month < 0) {
    currentViewMonth.month = 11;
    currentViewMonth.year--;
  }
  renderWeek();
}

function viewDayFromWeek(dateStr) {
  const date = new Date(dateStr + 'T12:00:00');
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const schedule = getMealSchedule(date);
  const dinner = schedule[4];
  const status = getKidStatus(date);

  const dayName = days[date.getDay()];
  const dateLabel = months[date.getMonth()] + ' ' + date.getDate() + ', ' + date.getFullYear();
  const dinnerName = dinner.detail || 'No dinner planned';

  let recipeBtn = '';
  if (dinner.recipeId) {
    const reg = RECIPE_REGISTRY.find(r => r.id === dinner.recipeId);
    if (reg) {
      let clickHandler;
      if (reg.source === 'custom') {
        clickHandler = `closeModal(); openCustomRecipe('${reg.id.replace(/'/g,"\\'")}')`;
      } else if (reg.source === 'inline') {
        clickHandler = `closeModal(); openRecipe(${reg.mealId})`;
      } else {
        clickHandler = `closeModal(); openPdfRecipe('${reg.path.replace(/'/g,"\\'")}', '${reg.name.replace(/'/g,"\\'")}')`;
      }
      recipeBtn = `<button class="view-recipe-btn" onclick="${clickHandler}" style="margin-right:8px">View Recipe</button>`;
    }
  }

  document.getElementById('modal-title').textContent = dayName;
  document.getElementById('modal-eyebrow-text').textContent = 'Day View';
  document.getElementById('modal-edit-btn').style.display = 'none';
  currentModalRecipeId = null;
  document.getElementById('modal-body').innerHTML = `
    <div style="color:var(--muted);font-size:14px;margin-bottom:20px">${dateLabel}</div>
    <div style="font-size:20px;font-weight:700;color:var(--text);margin-bottom:8px">${dinnerName}</div>
    <div style="margin-bottom:20px">
      <span class="month-day-tag ${status}-tag">${status === 'kids' ? 'Kids Night' : 'Solo Night'}</span>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      ${recipeBtn}
      <button class="btn-small" onclick="closeModal(); currentViewDate = new Date('${dateStr}T12:00:00'); showPage('today')">View Full Day</button>
    </div>
  `;

  history.pushState({ modal: true, page: getCurrentPage() }, '');
  document.getElementById('modal-overlay').classList.add('open');
}

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  const tab = document.querySelector('.nav-tab[data-page="' + id + '"]');
  if (tab) tab.classList.add('active');
  if (id === 'today') { currentViewDate = new Date(); renderToday(); }
  if (id === 'meals') { setTimeout(initThumbnails, 100); }
  window.scrollTo(0, 0);
}

function getCurrentMealIndex(schedule) {
  const now = new Date();
  const currentMins = now.getHours() * 60 + now.getMinutes();
  let current = 0;
  schedule.forEach((meal, i) => {
    const [time, ampm] = meal.time.split(' ');
    let [h, m] = time.split(':').map(Number);
    if (ampm === 'PM' && h !== 12) h += 12;
    if (ampm === 'AM' && h === 12) h = 0;
    if (currentMins >= h * 60 + m) current = i;
  });
  return current;
}

function findPdfRecipe(name) {
  const lower = name.toLowerCase();
  return [...PDF_RECIPES, ...SPECIAL_RECIPES].find(r => r.name.toLowerCase() === lower);
}

function renderToday() {
  const viewDate = currentViewDate;
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const viewing = isToday(viewDate);

  document.getElementById('today-date-label').textContent = viewing ? 'Today' : '';
  document.getElementById('today-date-label').style.display = viewing ? '' : 'none';
  document.getElementById('today-day-name').textContent = days[viewDate.getDay()];
  document.getElementById('today-full-date').textContent =
    months[viewDate.getMonth()] + ' ' + viewDate.getDate() + ', ' + viewDate.getFullYear();

  document.getElementById('dinner-label').textContent = viewing ? "Tonight's Dinner" : 'Dinner';

  const schedule = getMealSchedule(viewDate);
  const currentIdx = viewing ? getCurrentMealIndex(schedule) : -1;
  const dinner = schedule[4];

  const dinnerName = dinner.detail || '—';
  document.getElementById('tonight-dinner').textContent = dinnerName;
  document.getElementById('tonight-meta').textContent = dinner.note || '';

  const recipeBtn = document.getElementById('tonight-recipe-btn');
  recipeBtn.style.display = dinner.recipeId ? '' : 'none';

  const timeline = document.getElementById('meal-timeline');
  timeline.innerHTML = schedule.map((meal, i) => {
    const clickAttr = meal.recipeId ? `onclick="openMealFromTimeline('${meal.recipeId}')"` : '';
    return `
    <div class="timeline-row ${i === currentIdx ? 'current' : ''} ${meal.closed ? 'closed' : ''} ${meal.recipeId ? 'clickable' : ''}" ${clickAttr}>
      <span class="timeline-time">${meal.time}</span>
      <span class="timeline-meal">${meal.name}</span>
      <span class="timeline-detail">${meal.detail}</span>
    </div>
  `}).join('');
}

// Currently viewed Plan week (offset from current Sunday, 0 = current week)
let currentPlanWeekOffset = 0;
// Block offset for next/prev arrows (shifts the entire 6-week window)
let planWeekBlockOffset = 0;

function navigatePlanWeeks(delta) {
  planWeekBlockOffset += delta * 6;
  currentPlanWeekOffset = planWeekBlockOffset;
  renderWeek();
}

function getSundayOfWeek(date) {
  const d = new Date(date);
  d.setHours(0,0,0,0);
  d.setDate(d.getDate() - d.getDay());
  return d;
}

function renderWeek() {
  const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const today = new Date();
  today.setHours(0,0,0,0);
  const todaySunday = getSundayOfWeek(today);

  // Render 6 week tabs based on current block offset
  const tabsContainer = document.getElementById('week-nav-tabs');
  let tabsHtml = '';
  for (let i = 0; i < 6; i++) {
    const offset = planWeekBlockOffset + i;
    const weekStart = new Date(todaySunday);
    weekStart.setDate(weekStart.getDate() + (offset * 7));
    const weekEnd = new Date(weekStart);
    weekEnd.setDate(weekEnd.getDate() + 6);
    let label;
    if (offset === 0) label = 'This Week';
    else if (offset === 1) label = 'Next Week';
    else if (offset === -1) label = 'Last Week';
    else label = (offset > 0 ? '+' : '') + offset + ' wks';
    const dates = monthNames[weekStart.getMonth()] + ' ' + weekStart.getDate() + ' - ' + monthNames[weekEnd.getMonth()] + ' ' + weekEnd.getDate();
    tabsHtml += '<button class="week-nav-tab' + (offset === currentPlanWeekOffset ? ' active' : '') + '" onclick="setPlanWeek(' + offset + ')">' +
      '<span class="week-tab-label">' + label + '</span>' +
      '<span class="week-tab-dates">' + dates + '</span>' +
    '</button>';
  }
  tabsContainer.innerHTML = tabsHtml;

  // Render meal cards for the selected week
  const weekStart = new Date(todaySunday);
  weekStart.setDate(weekStart.getDate() + (currentPlanWeekOffset * 7));

  const grid = document.getElementById('week-meals-grid');
  const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  let cardsHtml = '';
  for (let i = 0; i < 7; i++) {
    const date = new Date(weekStart);
    date.setDate(date.getDate() + i);
    const isTodayDate = date.getTime() === today.getTime();
    const schedule = getMealSchedule(date);
    const dinner = schedule[4];
    if (!dinner.recipeId) continue;
    const reg = RECIPE_REGISTRY.find(r => r.id === dinner.recipeId);
    if (!reg) continue;
    cardsHtml += renderMealCard(reg, { date: date, isToday: isTodayDate });
  }
  grid.innerHTML = cardsHtml;

  setTimeout(initThumbnails, 100);
}

function setPlanWeek(offset) {
  currentPlanWeekOffset = offset;
  renderWeek();
}

// Shared meal card renderer used by Plan and Meals pages
function renderMealCard(r, opts) {
  opts = opts || {};
  let clickHandler;
  if (r.source === 'custom') {
    clickHandler = "openCustomRecipe('" + r.id.replace(/'/g,"\\'") + "')";
  } else if (r.source === 'inline') {
    clickHandler = 'openRecipe(' + r.mealId + ')';
  } else {
    clickHandler = "openPdfRecipe('" + r.path.replace(/'/g,"\\'") + "', '" + r.name.replace(/'/g,"\\'") + "')";
  }
  const existingImage = getRecipeImage(r.id, r.path);
  let thumbContent;
  if (existingImage) {
    thumbContent = '<div class="meal-card-thumb"><img src="' + existingImage + '" style="width:100%;height:100%;object-fit:cover"></div>';
  } else if (r.source === 'pdf') {
    thumbContent = '<div class="meal-card-thumb" data-pdf-path="' + r.path + '" data-recipe-id="' + r.id + '"></div>';
  } else {
    thumbContent = '<div class="meal-card-thumb" style="background:linear-gradient(135deg,#f0f5e8,#e0ead4)"></div>';
  }

  // Date block (left side) - only on Plan page
  let dateBlock = '';
  if (opts.date) {
    const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    dateBlock = '<div class="meal-card-date">' +
      '<span class="month">' + monthNames[opts.date.getMonth()] + '</span>' +
      '<span class="day">' + opts.date.getDate() + '</span>' +
    '</div>';
  }

  // Meta: time + stars
  let metaText = '';
  const cookTimeStr = r.cookTime ? (r.cookTime.toString().toLowerCase().includes('min') ? r.cookTime : r.cookTime + ' Min') : '';
  if (cookTimeStr) metaText += cookTimeStr;
  const miniStars = renderMiniStars(r.id);
  if (miniStars) metaText += (metaText ? ' ' : '') + miniStars;

  // HF badge on right
  const isHF = isRecipeHellofresh(r.id);
  let badge = '';
  if (isHF) badge = '<div class="hf-badge">' + HF_BADGE_SVG + '</div>';
  else if (r.source === 'custom') badge = '<div class="hf-badge text-only">Custom</div>';

  const todayClass = opts.isToday ? ' today-card' : '';
  return '<div class="meal-card' + todayClass + '" onclick="' + clickHandler + '">' +
    thumbContent +
    '<div class="meal-card-body">' +
      dateBlock +
      '<div class="meal-card-info">' +
        '<div class="meal-card-title">' + r.name + '</div>' +
        '<div class="meal-card-meta">' + metaText + '</div>' +
      '</div>' +
      badge +
    '</div>' +
  '</div>';
}

let _thumbRetries = 0;
function initThumbnails() {
  if (!window.pdfjsLib) {
    if (_thumbRetries++ < 20) { setTimeout(initThumbnails, 500); }
    return;
  }
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(async (entry) => {
      if (!entry.isIntersecting) return;
      const el = entry.target;
      const path = el.dataset.pdfPath;
      const rid = el.dataset.recipeId;
      if (!path || el.dataset.loaded) return;
      el.dataset.loaded = 'true';
      observer.unobserve(el);
      try {
        // Check uploaded image first
        if (rid && recipeImageCache[rid]) {
          el.innerHTML = '<img src="' + recipeImageCache[rid] + '" style="width:100%;height:100%;object-fit:cover">';
          return;
        }
        // Check extracted image cache
        const imgCached = sessionStorage.getItem('img:' + path);
        if (imgCached) {
          el.innerHTML = '<img src="' + imgCached + '" style="width:100%;height:100%;object-fit:cover">';
          return;
        }
        // Check old thumb cache as fallback
        const cached = sessionStorage.getItem('thumb:' + path);
        if (cached) {
          el.innerHTML = '<img src="' + cached + '" style="width:100%;height:100%;object-fit:cover">';
          return;
        }
        // Extract at higher quality, crop to food photo (top 40%)
        const pdf = await window.pdfjsLib.getDocument(encodeURI(path)).promise;
        const page = await pdf.getPage(1);
        const scale = 0.6;
        const viewport = page.getViewport({ scale });
        const canvas = document.createElement('canvas');
        canvas.width = viewport.width;
        const cropHeight = Math.floor(viewport.height * 0.4);
        canvas.height = cropHeight;
        const ctx = canvas.getContext('2d');
        await page.render({ canvasContext: ctx, viewport }).promise;
        const dataUrl = canvas.toDataURL('image/jpeg', 0.6);
        try {
          sessionStorage.setItem('img:' + path, dataUrl);
        } catch(e) {
          // sessionStorage full — clear old entries and retry
          try {
            const keysToRemove = [];
            for (let k = 0; k < sessionStorage.length; k++) {
              const key = sessionStorage.key(k);
              if (key && (key.startsWith('thumb:') || key.startsWith('img:'))) keysToRemove.push(key);
            }
            keysToRemove.forEach(k => sessionStorage.removeItem(k));
            sessionStorage.setItem('img:' + path, dataUrl);
          } catch(e2) { /* give up caching */ }
        }
        el.innerHTML = '<img src="' + dataUrl + '" style="width:100%;height:100%;object-fit:cover">';
      } catch(e) {
        el.innerHTML = '<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:12px">PDF</div>';
      }
    });
  }, { rootMargin: '200px' });
  document.querySelectorAll('.meal-card-thumb[data-pdf-path]:not([data-loaded])').forEach(el => observer.observe(el));
}

// ============================================================
// PDF METADATA EXTRACTION
// ============================================================

async function extractPdfMeta(path) {
  if (!window.pdfjsLib) return null;
  const cacheKey = 'meta:' + path;
  const cached = sessionStorage.getItem(cacheKey);
  if (cached) return JSON.parse(cached);
  try {
    const pdf = await window.pdfjsLib.getDocument(encodeURI(path)).promise;
    const page = await pdf.getPage(1);
    const textContent = await page.getTextContent();
    const text = textContent.items.map(item => item.str).join(' ');
    const prepMatch = text.match(/PREP\s*[:\s]*(\d+)\s*MIN/i);
    const totalMatch = text.match(/TOTAL\s*[:\s]*(\d+)\s*MIN/i);
    const cookMatch = text.match(/COOK\s*[:\s]*(\d+)\s*MIN/i);
    const caloriesMatch = text.match(/CALORIES\s*[:\s]*(\d+)/i);
    const meta = {
      prepTime: prepMatch ? parseInt(prepMatch[1]) : null,
      totalTime: totalMatch ? parseInt(totalMatch[1]) : null,
      cookTime: cookMatch ? parseInt(cookMatch[1]) : null,
      calories: caloriesMatch ? parseInt(caloriesMatch[1]) : null
    };
    try { sessionStorage.setItem(cacheKey, JSON.stringify(meta)); } catch(e) {}
    return meta;
  } catch(e) { return null; }
}

async function loadPdfMetaForCards() {
  if (!window.pdfjsLib) return;
  const cards = document.querySelectorAll('.meal-card-thumb[data-pdf-path]');
  for (const card of cards) {
    const path = card.dataset.pdfPath;
    if (!path) continue;
    const meta = await extractPdfMeta(path);
    if (meta && meta.totalTime) {
      const metaEl = card.closest('.meal-card')?.querySelector('.meal-card-meta');
      if (metaEl && !metaEl.dataset.metaLoaded) {
        metaEl.dataset.metaLoaded = 'true';
        const existing = metaEl.textContent.trim();
        metaEl.innerHTML = meta.totalTime + ' min' + (existing ? ' · ' + existing : '');
      }
      // Update registry cook time for filtering
      const reg = RECIPE_REGISTRY.find(r => r.path === path);
      if (reg && !reg.cookTime) reg.cookTime = meta.totalTime + ' min';
      if (reg) reg._totalMinutes = meta.totalTime;
    }
  }
}

// ============================================================
// PDF INGREDIENT EXTRACTION
// ============================================================

async function extractPdfIngredients(path) {
  if (!window.pdfjsLib) return [];
  const cacheKey = 'ing:' + path;
  const cached = sessionStorage.getItem(cacheKey);
  if (cached) return JSON.parse(cached);
  try {
    const pdf = await window.pdfjsLib.getDocument(encodeURI(path)).promise;
    const page = await pdf.getPage(1);
    const textContent = await page.getTextContent();
    const items = textContent.items;
    const ingredients = [];
    for (let i = 0; i < items.length; i++) {
      const str = items[i].str.trim();
      if (!str || str.length > 40 || str.length < 2) continue;
      if (/^[A-Z][a-z]/.test(str) && !str.includes('PREP') && !str.includes('COOK') &&
          !str.includes('TOTAL') && !str.includes('CALORIES') && !str.includes('HelloFresh') &&
          !str.includes('HELLO') && items[i].height && items[i].height < 12) {
        ingredients.push(str);
      }
    }
    const result = ingredients.slice(0, 12);
    try { sessionStorage.setItem(cacheKey, JSON.stringify(result)); } catch(e) {}
    return result;
  } catch(e) { return []; }
}

function renderStarRating(recipeId) {

  const starSvg = (i) => `<svg viewBox="0 0 24 24" class="star ${i <= stars ? 'filled' : ''}" onclick="event.stopPropagation(); setStarRating('${recipeId}', ${i})"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>`;

      <div class="star-rating">${[1,2,3,4,5].map(i => starSvg(i)).join('')}</div>
      ${renderMealTypeToggle(recipeId)}
      <button class="btn-favorite ${isFav ? 'active' : ''}" onclick="event.stopPropagation(); toggleFavorite('${recipeId}')">${isFav ? '★ Favorite' : '☆ Favorite'}</button>

function renderMiniStars(recipeId) {

async function toggleFavorite(recipeId) {

async function toggleDeleted(recipeId) {

  const newDel = !(existing.is_deleted || false);
  await saveRating(recipeId, existing.stars || 0, existing.is_favorite || false, newDel);

async function toggleHellofresh(recipeId, checked) {

function refreshRatingUI(recipeId) {

function renderMealTypeToggle(recipeId) {
  const reg = RECIPE_REGISTRY.find(r => r.id === recipeId);

  </div>`;
}

function setMealType(recipeId, type) {
  const current = ratingsCache[recipeId] || {};
  saveRating(recipeId, current.stars || 0, current.is_favorite || false, current.is_deleted || false, type);
  const reg = RECIPE_REGISTRY.find(r => r.id === recipeId);
  if (reg) {
    if (reg.source === 'inline') openRecipe(reg.mealId);
    else openPdfRecipe(reg.path, reg.name);
  }
}

// FILTER STATE
// ============================================================

let activeProteinFilter = 'all';
let activeRatingFilter = 0;
let activeTimeFilter = 0;
let showFavoritesOnly = false;

function setProteinFilter(protein) {
  activeProteinFilter = protein;
  showFavoritesOnly = false;
  renderMeals();
}

function setFavoritesFilter() {
  showFavoritesOnly = !showFavoritesOnly;
  if (showFavoritesOnly) activeProteinFilter = 'all';
  renderMeals();
}

function setRatingFilter(minStars) {
  activeRatingFilter = parseInt(minStars) || 0;
  renderMeals();
}

function setTimeFilter(maxMin) {
  activeTimeFilter = parseInt(maxMin) || 0;
  renderMeals();
}

function renderMeals() {
  // Filter bar
  const proteins = ['all', 'chicken', 'beef', 'pork', 'turkey', 'seafood'];
  const filterBar = document.getElementById('filter-bar');
  filterBar.innerHTML = proteins.map(p =>
    `<button class="filter-chip ${activeProteinFilter === p && !showFavoritesOnly ? 'active' : ''}" onclick="setProteinFilter('${p}')">${p === 'all' ? 'All' : p.charAt(0).toUpperCase() + p.slice(1)}</button>`
  ).join('') +
    `<button class="filter-chip ${showFavoritesOnly ? 'active' : ''}" onclick="setFavoritesFilter()">★ Favorites</button>` +
    `<select class="filter-select" onchange="setRatingFilter(this.value)">
      <option value="0" ${activeRatingFilter === 0 ? 'selected' : ''}>Any Rating</option>
      <option value="1" ${activeRatingFilter === 1 ? 'selected' : ''}>★+ (1+)</option>
      <option value="2" ${activeRatingFilter === 2 ? 'selected' : ''}>★★+ (2+)</option>
      <option value="3" ${activeRatingFilter === 3 ? 'selected' : ''}>★★★+ (3+)</option>
      <option value="4" ${activeRatingFilter === 4 ? 'selected' : ''}>★★★★+ (4+)</option>
      <option value="5" ${activeRatingFilter === 5 ? 'selected' : ''}>★★★★★ (5)</option>
    </select>` +
    `<select class="filter-select" onchange="setTimeFilter(this.value)">
      <option value="0" ${activeTimeFilter === 0 ? 'selected' : ''}>Any Time</option>
      <option value="30" ${activeTimeFilter === 30 ? 'selected' : ''}>Under 30 min</option>
      <option value="45" ${activeTimeFilter === 45 ? 'selected' : ''}>Under 45 min</option>
      <option value="60" ${activeTimeFilter === 60 ? 'selected' : ''}>Under 60 min</option>
    </select>`;

  // Filter recipes
  let recipes = RECIPE_REGISTRY.filter(r => {
    const rating = ratingsCache[r.id] || {};
    // Hide deleted by default
    if (rating.is_deleted) return false;
    // Protein filter
    if (activeProteinFilter !== 'all' && r.protein !== activeProteinFilter) return false;
    // Favorites filter
    if (showFavoritesOnly && !rating.is_favorite) return false;
    // Rating filter
    if (activeRatingFilter > 0 && (rating.stars || 0) < activeRatingFilter) return false;
    // Time filter
    if (activeTimeFilter > 0) {
      const mins = r._totalMinutes || (r.cookTime ? parseInt(r.cookTime) : null);
      if (!mins || mins >= activeTimeFilter) return false;
    }
    return true;
  });

  // Render grid - uniform cards using shared renderer
  const grid = document.getElementById('meals-grid');
  grid.innerHTML = recipes.map(r => renderMealCard(r)).join('');

  // Re-init thumbnails for newly rendered cards
  setTimeout(initThumbnails, 100);
}

function getWeekKey() {
  const sunday = getShoppingWeekStart();
  const jan1 = new Date(sunday.getFullYear(), 0, 1);
  const dayOfYear = Math.floor((sunday - jan1) / 86400000) + 1;
  const weekNum = Math.ceil((dayOfYear + jan1.getDay()) / 7);
  return sunday.getFullYear() + '-W' + String(weekNum).padStart(2, '0');
}

async function renderShopping() {
  const list = generateShoppingList();
  const weekKey = getWeekKey();
  const { data } = await sb.from('shopping').select('*').eq('week_key', weekKey);
  const checkedItems = {};
  if (data) data.forEach(d => checkedItems[d.item] = true);

  const hfMeals = list._hfMeals || [];
  const regularCats = Object.entries(list).filter(([k]) => k !== '_hfMeals');

  const container = document.getElementById('shopping-list');
  let html = regularCats.map(([cat, items]) => `
    <div class="shopping-cat">
      <div class="shopping-cat-title">${cat}</div>
      ${items.map(item => `
        <div class="shopping-item ${checkedItems[item] ? 'checked' : ''}" onclick="toggleCheck(this, '${item.replace(/'/g,"\\'")}')">
          <div class="shop-check"></div>
          <span class="shop-text">${item}</span>
        </div>
      `).join('')}
    </div>
  `).join('');

  // Split HF meals: ones with structured data vs PDF-only
  const hfWithData = hfMeals.filter(m => m.hasData);
  const hfPdfOnly = hfMeals.filter(m => !m.hasData);

  if (hfWithData.length > 0) {
    html += `<div class="shopping-cat">
      <div class="shopping-cat-title">HelloFresh Meals</div>
      ${hfWithData.map(m => {
        const hfData = HF_RECIPE_DATA[m.name];
        return `<div style="margin-bottom:12px">
          <div style="font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--accent);margin-bottom:4px">${m.name} (${m.day})</div>
          ${hfData.ingredients.map(ing => {
            const itemKey = ing.amount + ' ' + ing.item;
            return `<div class="shopping-item ${checkedItems[itemKey] ? 'checked' : ''}" onclick="toggleCheck(this, '${itemKey.replace(/'/g,"\\'")}')">
              <div class="shop-check"></div>
              <span class="shop-text">${itemKey}</span>
            </div>`;
          }).join('')}
        </div>`;
      }).join('')}
    </div>`;
  }

  if (hfPdfOnly.length > 0) {
    html += `<div class="shopping-cat">
      <div class="shopping-cat-title">HelloFresh Meals (PDF)</div>
      ${hfPdfOnly.map(m => `
        <div style="margin-bottom:12px">
          <div style="font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--accent);margin-bottom:4px">${m.name} (${m.day})</div>
          <div class="hf-ingredients" data-ing-path="${m.path}">
            <div style="font-size:12px;color:var(--muted);padding:4px 0">Loading ingredients...</div>
          </div>
        </div>
      `).join('')}
    </div>`;
  }

  container.innerHTML = html;

  // Lazy load HF ingredients only for PDF-only meals
  if (hfPdfOnly.length > 0) {
    if (window.pdfjsLib) {
      loadHfIngredients(checkedItems);
    } else {
      setTimeout(() => loadHfIngredients(checkedItems), 2000);
    }
  }
}

async function loadHfIngredients(checkedItems) {
  if (!window.pdfjsLib) return;
  const els = document.querySelectorAll('.hf-ingredients[data-ing-path]');
  for (const el of els) {
    const path = el.dataset.ingPath;
    const ingredients = await extractPdfIngredients(path);
    if (ingredients.length > 0) {
      el.innerHTML = ingredients.map(ing => {
        const itemKey = ing;
        return `<div class="shopping-item ${checkedItems[itemKey] ? 'checked' : ''}" onclick="toggleCheck(this, '${itemKey.replace(/'/g,"\\'")}')">
          <div class="shop-check"></div>
          <span class="shop-text">${ing}</span>
        </div>`;
      }).join('');
    } else {
      el.innerHTML = '<div style="font-size:12px;color:var(--muted);padding:4px 0">Check recipe card for ingredients</div>';
    }
  }
}

async function toggleCheck(el, item) {
  el.classList.toggle('checked');
  const weekKey = getWeekKey();
  if (el.classList.contains('checked')) {
    await sb.from('shopping').upsert({ week_key: weekKey, item, checked: true });
  } else {
    await sb.from('shopping').delete().eq('week_key', weekKey).eq('item', item);
  }
}

async function clearChecked() {
  const weekKey = getWeekKey();
  await sb.from('shopping').delete().eq('week_key', weekKey);
  await renderShopping();
}

  const recipeId = reg ? reg.id : 'pdf-' + slugify(name);
  const hfData = HF_RECIPE_DATA[name];
  const isHF = isRecipeHellofresh(recipeId);
  currentModalRecipeId = recipeId;

  document.getElementById('modal-title').textContent = name;
  document.getElementById('modal-eyebrow-text').textContent = 'Recipe';

      <div style="display:flex;gap:12px;margin-bottom:12px;font-size:13px;color:var(--muted)">

        <div class="modal-section-label">Ingredients</div>
        ${hfData.ingredients.map(ing => `
          <div class="modal-ingredient">
            <span class="ing-amount">${ing.amount}</span>
            <span>${ing.item}</span>
          </div>
        `).join('')}
      </div>
      <div class="modal-section">
        <div class="modal-section-label">Instructions</div>
        ${hfData.steps.map((step, i) => `
          <div class="modal-step">
            <span class="step-num">${i+1}</span>
            <span>${step}</span>

        `).join('')}

  } else {

    let ingredientsHtml = '<p style="color:var(--muted);font-size:13px">Loading ingredients...</p>';

      ${imageHtml}
      <div id="rating-${recipeId}">${renderStarRating(recipeId)}</div>

        <div class="modal-section-label">Ingredients</div>

      </div>

  }

  history.pushState({ modal: true, page: getCurrentPage() }, '');
  document.getElementById('modal-overlay').classList.add('open');

  if (!hfData) {
    // Load ingredients async for PDF-only recipes
    const ingredients = await extractPdfIngredients(path);
    const el = document.getElementById('pdf-ingredients');
    if (el) {
      if (ingredients.length > 0) {
        el.innerHTML = ingredients.map(function(ing) {

        }).join('');
      } else {
        el.innerHTML = '<p style="color:var(--muted);font-size:13px">See recipe card for ingredients</p>';
      }
    }
  }
}

function openMealFromTimeline(recipeId) {
  const reg = RECIPE_REGISTRY.find(r => r.id === recipeId);
  if (!reg) return;
  if (reg.source === 'custom') {
    openCustomRecipe(reg.id);
  } else if (reg.source === 'inline') {
    openRecipe(reg.mealId);
  } else {
    openPdfRecipe(reg.path, reg.name);
  }
}

function openTonightRecipe() {
  const schedule = getMealSchedule(currentViewDate);
  const dinner = schedule[4];
  if (dinner.recipeId) {
    openMealFromTimeline(dinner.recipeId);
  }
}

function getCurrentPage() {
  const active = document.querySelector('.page.active');
  return active ? active.id.replace('page-', '') : 'today';
}

function closeModal(event) {
  if (!event || event.target === document.getElementById('modal-overlay') || event.target.classList.contains('modal-close')) {
    document.getElementById('modal-overlay').classList.remove('open');
    document.getElementById('modal-content').classList.remove('pdf-modal');
    document.getElementById('modal-edit-btn').style.display = 'none';
    currentModalRecipeId = null;
    if (history.state && history.state.modal) {
      history.back();
    }
  }
}

window.addEventListener('popstate', function(e) {
  if (document.getElementById('modal-overlay').classList.contains('open')) {
    document.getElementById('modal-overlay').classList.remove('open');
    document.getElementById('modal-content').classList.remove('pdf-modal');
  }
});

let editorRecipeId = null;

function openRecipeEditor(recipeId) {
  editorRecipeId = recipeId || null;
  var data = { name: '', prepTime: '', totalTime: '', calories: '', protein: 'chicken', mealType: 'both', isHellofresh: false, ingredients: [{ amount: '', item: '' }], steps: [''] };

  if (recipeId) {
    var custom = customRecipes.find(function(r) { return r.id === recipeId; });
    if (custom) {
      data = {
        name: custom.name,
        prepTime: custom.prep_time || '',
        totalTime: custom.total_time || '',
        calories: custom.calories || '',
        protein: custom.protein || 'other',
        mealType: custom.meal_type || 'both',
        isHellofresh: isRecipeHellofresh(recipeId),
        ingredients: (custom.ingredients && custom.ingredients.length > 0) ? custom.ingredients : [{ amount: '', item: '' }],
        steps: (custom.steps && custom.steps.length > 0) ? custom.steps : ['']
      };
    } else {
      var reg = RECIPE_REGISTRY.find(function(r) { return r.id === recipeId; });
      if (reg && reg.source === 'inline') {
        var meal = MEALS.find(function(m) { return m.id === reg.mealId; });
        if (meal) {
          data = {
            name: meal.name,
            prepTime: parseInt(meal.cookTime) || '',
            totalTime: parseInt(meal.cookTime) || '',
            calories: '',
            protein: reg.protein,
            mealType: meal.type,
            isHellofresh: isRecipeHellofresh(recipeId),
            ingredients: meal.ingredients.map(function(i) { return { amount: i.amount, item: i.item }; }),
            steps: meal.steps.slice()
          };
        }
      } else if (reg) {
        var hfData = HF_RECIPE_DATA[reg.name];
        if (hfData) {
          data = {
            name: reg.name,
            prepTime: hfData.prepTime || '',
            totalTime: hfData.totalTime || '',
            calories: hfData.calories || '',
            protein: reg.protein,
            mealType: reg.mealType,
            isHellofresh: true,
            ingredients: hfData.ingredients.map(function(i) { return { amount: i.amount, item: i.item }; }),
            steps: hfData.steps.slice()
          };
        } else {
          data.name = reg.name;
          data.protein = reg.protein;
          data.mealType = reg.mealType;
        }
      }
    }
  }

  renderRecipeEditor(data);
}

function getEditorIngredients() {
  var ings = [];
  var container = document.getElementById('editor-ingredients');
  var rows = container.querySelectorAll('.editor-row');
  rows.forEach(function(row) {
    var amountInput = row.querySelector('[data-ing-amount]');
    var itemInput = row.querySelector('[data-ing-item]');
    if (amountInput && itemInput) {
      ings.push({ amount: amountInput.value.trim(), item: itemInput.value.trim() });
    }
  });
  return ings;
}

function getEditorSteps() {
  var steps = [];
  var container = document.getElementById('editor-steps');
  var rows = container.querySelectorAll('.editor-row');
  rows.forEach(function(row) {
    var textarea = row.querySelector('textarea');
    if (textarea) steps.push(textarea.value.trim());
  });
  return steps;
}

function addEditorIngredient() {
  var ings = getEditorIngredients();
  ings.push({ amount: '', item: '' });
  var data = getCurrentEditorData();
  data.ingredients = ings;
  updateEditorIngredients(data.ingredients);
}

function removeEditorIngredient(idx) {
  var ings = getEditorIngredients();
  ings.splice(idx, 1);
  if (ings.length === 0) ings.push({ amount: '', item: '' });
  updateEditorIngredients(ings);
}

function updateEditorIngredients(ings) {
  var html = ings.map(function(ing, i) {
    return '<div class="editor-row">' +
      '<input class="amount-input" type="text" placeholder="Amount" value="' + (ing.amount || '').replace(/"/g, '&quot;') + '" data-ing-amount="' + i + '">' +
      '<input type="text" placeholder="Ingredient" value="' + (ing.item || '').replace(/"/g, '&quot;') + '" data-ing-item="' + i + '">' +
      '<button class="editor-remove-btn" onclick="removeEditorIngredient(' + i + ')" type="button">&times;</button>' +
      '</div>';
  }).join('');
  document.getElementById('editor-ingredients').innerHTML = html;
}

function addEditorStep() {
  var steps = getEditorSteps();
  steps.push('');
  updateEditorSteps(steps);
}

function removeEditorStep(idx) {
  var steps = getEditorSteps();
  steps.splice(idx, 1);
  if (steps.length === 0) steps.push('');
  updateEditorSteps(steps);
}

function updateEditorSteps(steps) {
  var html = steps.map(function(step, i) {
    return '<div class="editor-row">' +
      '<span style="color:var(--accent);font-weight:700;min-width:24px">' + (i + 1) + '</span>' +
      '<textarea rows="2" placeholder="Step ' + (i + 1) + '..." data-step="' + i + '">' + (step || '').replace(/</g, '&lt;') + '</textarea>' +
      '<button class="editor-remove-btn" onclick="removeEditorStep(' + i + ')" type="button">&times;</button>' +
      '</div>';
  }).join('');
  document.getElementById('editor-steps').innerHTML = html;
}

function getCurrentEditorData() {
  return {
    name: (document.getElementById('editor-name') || {}).value || '',
    prepTime: (document.getElementById('editor-prep') || {}).value || '',
    totalTime: (document.getElementById('editor-total') || {}).value || '',
    calories: (document.getElementById('editor-cal') || {}).value || '',
    protein: (document.getElementById('editor-protein') || {}).value || 'other',
    mealType: (document.getElementById('editor-mealtype') || {}).value || 'both',
    ingredients: getEditorIngredients(),
    steps: getEditorSteps()
  };
}

async function saveRecipe() {
  var data = getCurrentEditorData();
  if (!data.name.trim()) {
    alert('Please enter a recipe name.');
    return;
  }

  var id = editorRecipeId || ('custom-' + slugify(data.name));

  // If editing a non-custom recipe, create a custom copy with the same ID
  var existingCustom = customRecipes.find(function(r) { return r.id === id; });
  if (!existingCustom && editorRecipeId) {
    // Editing an inline/HF recipe: use a custom-prefixed ID
    id = 'custom-' + slugify(data.name);
  }

  var ingredients = data.ingredients.filter(function(i) { return i.item.trim() !== ''; });
  var steps = data.steps.filter(function(s) { return s.trim() !== ''; });

  var row = {
    id: id,
    name: data.name.trim(),
    ingredients: ingredients,
    steps: steps,
    prep_time: data.prepTime ? parseInt(data.prepTime) : null,
    total_time: data.totalTime ? parseInt(data.totalTime) : null,
    calories: data.calories ? parseInt(data.calories) : null,
    protein: data.protein,
    meal_type: data.mealType,
    updated_at: new Date().toISOString()
  };

  try {
    await sb.from('custom_recipes').upsert(row);
  } catch(e) {
    console.warn('Save failed:', e);
    alert('Failed to save recipe. Check console.');
    return;
  }

  // Update local data
  var existingIdx = customRecipes.findIndex(function(r) { return r.id === id; });
  if (existingIdx >= 0) {
    customRecipes[existingIdx] = row;
  } else {
    customRecipes.push(row);
  }

  // Update RECIPE_REGISTRY
  var regIdx = RECIPE_REGISTRY.findIndex(function(r) { return r.id === id; });
  var entry = {
    id: id,
    name: row.name,
    source: 'custom',
    protein: row.protein || 'other',
    mealType: row.meal_type || 'both',
    cookTime: row.total_time ? row.total_time + ' min' : null,
    _totalMinutes: row.total_time,
    _customData: row
  };
  if (regIdx >= 0) {
    RECIPE_REGISTRY[regIdx] = entry;
  } else {
    RECIPE_REGISTRY.push(entry);
  }

  // Save featured image if changed
  var editorImg = document.getElementById('editor-image-img');
  if (editorImg && editorImg.dataset.newImage) {
    saveRecipeImage(id, editorImg.dataset.newImage);
  }

  // Save HelloFresh setting
  var hfCheckbox = document.getElementById('editor-hellofresh');
  if (hfCheckbox) {
    var current = ratingsCache[id] || {};
    saveRating(id, current.stars || 0, current.is_favorite || false, current.is_deleted || false, row.meal_type, hfCheckbox.checked);
  }

  // Close modal and re-render
  document.getElementById('modal-overlay').classList.remove('open');
  if (history.state && history.state.modal) history.back();
  renderMeals();
}

function editCurrentRecipe() {
  if (!currentModalRecipeId) return;
  // Close the current modal view first
  document.getElementById('modal-overlay').classList.remove('open');
  if (history.state && history.state.modal) history.back();
  // Open editor
  setTimeout(function() { openRecipeEditor(currentModalRecipeId); }, 50);
}

// ============================================================
// INIT
// ============================================================

(async function init() {
  try { await loadRatings(); } catch(e) { console.warn('Ratings load failed:', e); }
  try { await loadRecipeImages(); } catch(e) { console.warn('Recipe images load failed:', e); }
  try { await loadCustomRecipes(); } catch(e) { console.warn('Custom recipes load failed:', e); }
  renderToday();
  renderWeek();
  renderMeals();
  try { await renderShopping(); } catch(e) { console.warn('Shopping load failed:', e); renderShoppingFallback(); }
  setTimeout(initThumbnails, 1000);
  setTimeout(loadPdfMetaForCards, 3000);

  try {
    sb.channel('shopping-changes')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'shopping' }, () => {
        renderShopping();
      })
      .subscribe();
  } catch(e) { console.warn('Realtime sub failed:', e); }
})();

function renderShoppingFallback() {
  const list = generateShoppingList();
  const saved = JSON.parse(localStorage.getItem('checked') || '{}');
  const hfMeals = list._hfMeals || [];
  const regularCats = Object.entries(list).filter(([k]) => k !== '_hfMeals');
  const container = document.getElementById('shopping-list');
  let html = regularCats.map(([cat, items]) => `
    <div class="shopping-cat">
      <div class="shopping-cat-title">${cat}</div>
      ${items.map(item => `
        <div class="shopping-item ${saved[item] ? 'checked' : ''}" onclick="toggleCheck(this, '${item.replace(/'/g,"\\'")}')">
          <div class="shop-check"></div>
          <span class="shop-text">${item}</span>
        </div>
      `).join('')}
    </div>
  `).join('');
  if (hfMeals.length > 0) {
    const hfWithData = hfMeals.filter(m => m.hasData);
    const hfPdfOnly = hfMeals.filter(m => !m.hasData);
    if (hfWithData.length > 0) {
      html += `<div class="shopping-cat">
        <div class="shopping-cat-title">HelloFresh Meals</div>
        ${hfWithData.map(m => {
          const hfData = HF_RECIPE_DATA[m.name];
          return `<div style="margin-bottom:12px">
            <div style="font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--accent);margin-bottom:4px">${m.name} (${m.day})</div>
            ${hfData.ingredients.map(ing => {
              const itemKey = ing.amount + ' ' + ing.item;
              return `<div class="shopping-item ${saved[itemKey] ? 'checked' : ''}" onclick="toggleCheck(this, '${itemKey.replace(/'/g,"\\'")}')">
                <div class="shop-check"></div>
                <span class="shop-text">${itemKey}</span>
              </div>`;
            }).join('')}
          </div>`;
        }).join('')}
      </div>`;
    }
    if (hfPdfOnly.length > 0) {
      html += `<div class="shopping-cat">
        <div class="shopping-cat-title">HelloFresh Meals (PDF)</div>
        ${hfPdfOnly.map(m => `
          <div style="font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--accent);margin-bottom:8px">${m.name} (${m.day})</div>
        `).join('')}
      </div>`;
    }
  }
  container.innerHTML = html;
}

</script>
